# Platypus Docker Configuration
#
# Single TLS ingress port (cfg.Ingress.Addr) carries every protocol:
#   - h2 / http/1.1   → REST + WebSocket (agent link, terminal, etc.)
#   - ptps-mesh ALPN  → mesh peers
# The installer / artifact distributor mount on the same port. Agents
# bootstrap with `curl -k https://<host>:9443/install/<token> | sh`.

ingress:
  addr: "0.0.0.0:9443"
  # cert / key empty → server generates a self-signed leaf at startup.
  # In prod, point these at real PEM files (e.g. /app/data/server.crt).
  cert: ""
  key: ""
  # public_addr is what install scripts + mesh peers see; defaults to
  # `addr` when empty. Set this to the externally reachable host:port.
  public_addr: "localhost:9443"

restful:
  db_file: "/app/data/platypus.db"
  # jwt_access_key / jwt_refresh_key: leave empty to auto-generate at
  # startup (tokens won't survive a server restart). Set for prod.
  # access_expire_time / refresh_expire_time in seconds; 0 = defaults
  # (15 min / 14 days).
  # The CA key-encryption-key lives in the same directory as db_file,
  # at ./ca.kek. It's auto-generated on first boot when the
  # PLATYPUS_CA_KEK env var is unset. For production, set the env var
  # to keep the KEK off the data volume.

distributor:
  channel: "stable"
  presigned_ttl: "5m"
  store:
    endpoint: "minio:9000"
    region: "us-east-1"
    bucket: "platypus-artifacts"
    prefix: "agent/"
    access_key_id: "platypus_admin"
    secret_access_key: "platypus_password"
    use_ssl: false

# Mesh overlay (optional). Leave psk_file empty to disable. The
# server self-issues its own cert-bound mesh identity from the
# project CA named below; agents in the same project trust the
# same chain.
mesh:
  psk_file: "/app/data/mesh.psk"
  project_id: "default"
  discovery_lan: true

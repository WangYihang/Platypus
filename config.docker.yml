# Platypus Docker Configuration
#
# Two config layers:
#
#   1. Bootstrap / infra (this file) — values the process needs before
#      it can start: bind addresses, TLS certs, DB path, secrets.
#      Changing these requires a restart.
#
#   2. Runtime policy — token TTLs, release channel, mesh discovery.
#      These live in the admin_settings DB table and are edited at
#      /admin/settings in the Web UI. Admin changes take effect
#      immediately. Fields in this file marked "→ UI-overridable"
#      act as the initial default when the DB has no override.
#
# Single TLS ingress port (cfg.Ingress.Addr) carries every protocol:
#   - h2 / http/1.1   → REST + WebSocket (agent link, terminal, etc.)
#   - ptps-mesh ALPN  → mesh peers
# The installer / artifact distributor mount on the same port. Agents
# bootstrap with `curl -k https://<host>:9443/install/<token> | sh`.

ingress:
  addr: "0.0.0.0:9443"
  # cert / key empty → server generates a self-signed leaf at startup.
  # In prod, point these at real PEM files (e.g. /app/data/server.crt).
  cert: ""
  key: ""
  # public_addr is what install scripts + mesh peers see; defaults to
  # `addr` when empty. Set this to the externally reachable host:port.
  public_addr: "localhost:9443"

restful:
  db_file: "/app/data/platypus.db"
  # jwt_access_key / jwt_refresh_key: leave empty to auto-generate at
  # startup (tokens won't survive a server restart). Set for prod.
  #
  # access_expire_time / refresh_expire_time — seconds; 0 = defaults
  # (15 min / 14 days). → UI-overridable under auth.access_token_ttl /
  # auth.refresh_token_ttl.
  #
  # The CA key-encryption-key lives in the same directory as db_file,
  # at ./ca.kek. It's auto-generated on first boot when the
  # PLATYPUS_CA_KEK env var is unset. For production, set the env var
  # to keep the KEK off the data volume.

distributor:
  channel: "stable"        # → UI-overridable as distributor.channel
  presigned_ttl: "5m"      # → UI-overridable as distributor.presigned_ttl
  store:
    endpoint: "minio:9000"
    region: "us-east-1"
    bucket: "platypus-artifacts"
    prefix: "agent/"
    # Object-store credentials. Blank in this file on purpose —
    # operators must inject them via env vars
    # (PLATYPUS_DISTRIBUTOR_STORE_ACCESS_KEY_ID,
    # PLATYPUS_DISTRIBUTOR_STORE_SECRET_ACCESS_KEY) or by overlaying a
    # site-specific config.yml. The server refuses to start if the
    # endpoint is set but either credential is empty.
    access_key_id: ""
    secret_access_key: ""
    use_ssl: false

# Mesh overlay (optional). Leave psk_file empty to disable. The
# server self-issues its own cert-bound mesh identity from the
# project CA named below; agents in the same project trust the
# same chain.
mesh:
  psk_file: "/app/data/mesh.psk"
  project_id: "default"
  discovery_lan: true      # → UI-overridable as mesh.discovery_lan
  # discovery_interval: 30 # → UI-overridable as mesh.discovery_interval_seconds

# Terminal session recording. When enabled, every interactive shell
# opened by an operator is captured as an asciinema v2 cast file under
# `dir` (defaults to <data-dir>/recordings). The web UI's Recordings
# page lists, plays back, and manages them.
recording:
  enabled: true
  dir: "/app/data/recordings"

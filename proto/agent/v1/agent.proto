syntax = "proto3";
package platypus.agent.v1;
option go_package = "github.com/WangYihang/Platypus/pkg/proto/agent/v1;agentpb";

// Envelope is the top-level message for all Agent <-> Server and
// Agent <-> Agent (mesh) communication.
message Envelope {
  uint32 version    = 1; // Protocol version (current = 1)
  string request_id = 2; // UUID for RPC request/response correlation
  int64  timestamp  = 3; // Unix nanosecond timestamp

  // Mesh routing fields. Optional — empty target_node means "for the
  // immediate peer / server this envelope was sent over" (legacy
  // hub-and-spoke behaviour). When target_node is set and does not match
  // the receiving node's NodeID, the receiver forwards the envelope along
  // its routing table toward that node.
  string source_node = 4; // NodeID of originator (base32, 32 chars)
  string target_node = 5; // NodeID of destination; empty = link-local
  uint32 ttl         = 6; // decremented at each forwarding hop; drop at 0

  oneof payload {
    // Connection lifecycle
    GetClientInfoRequest  get_client_info_request = 10;
    ClientInfoResponse    client_info_response    = 11;
    DuplicateClientNotice duplicate_client        = 12;
    UpdateRequest         update_request          = 13;

    // Process management
    ProcessStartRequest     process_start_request     = 20;
    ProcessStartedResponse  process_started_response  = 21;
    ProcessStoppedNotice    process_stopped           = 22;
    ProcessTerminateRequest process_terminate_request = 23;
    StdioData               stdio                     = 24;
    WindowSizeUpdate        window_size               = 25;

    // RPC: command execution
    ExecRequest  exec_request  = 30;
    ExecResponse exec_response = 31;

    // RPC: file operations
    ReadFileRequest   read_file_request   = 32;
    ReadFileResponse  read_file_response  = 33;
    WriteFileRequest  write_file_request  = 34;
    WriteFileResponse write_file_response = 35;
    FileSizeRequest   file_size_request   = 36;
    FileSizeResponse  file_size_response  = 37;

    // Tunneling
    TunnelCreateRequest      tunnel_create_request     = 40;
    TunnelCreatedResponse    tunnel_created_response   = 41;
    TunnelCreateFailed       tunnel_create_failed      = 42;
    TunnelData               tunnel_data               = 43;
    TunnelCloseRequest       tunnel_close_request      = 44;
    TunnelClosedNotice       tunnel_closed             = 45;
    TunnelConnectRequest     tunnel_connect_request    = 46;
    TunnelConnectedResponse  tunnel_connected_response = 47;
    TunnelConnectFailed      tunnel_connect_failed     = 48;
    TunnelDisconnectedNotice tunnel_disconnected       = 49;

    // SOCKS5
    Socks5CreateRequest     socks5_create_request     = 50;
    Socks5CreatedResponse   socks5_created_response   = 51;
    Socks5CreateFailed      socks5_create_failed      = 52;
    Socks5DestroyRequest    socks5_destroy_request    = 53;
    Socks5DestroyedResponse socks5_destroyed_response = 54;
    Socks5DestroyFailed     socks5_destroy_failed     = 55;

    // Mesh: link handshake + keepalive
    MeshHello     mesh_hello     = 60;
    MeshHelloAck  mesh_hello_ack = 61;
    MeshKeepalive mesh_keepalive = 62;

    // Mesh: peer-table gossip
    MeshPeerAnnounce mesh_peer_announce = 63;
    MeshPeerDelta    mesh_peer_delta    = 64;

    // Mesh: link-state routing
    MeshLSA         mesh_lsa         = 65;
    MeshUnreachable mesh_unreachable = 66;

    // Enrollment (PAT / session_token exchange)
    AgentEnrollRequest  agent_enroll_request  = 70;
    AgentEnrollResponse agent_enroll_response = 71;

    // Session renewal (in-band rotation without reconnect)
    SessionRenewRequest  session_renew_request  = 72;
    SessionRenewResponse session_renew_response = 73;
  }
}

// --- Connection lifecycle ---

message GetClientInfoRequest {}

message ClientInfoResponse {
  string              version             = 1;
  string              os                  = 2;
  string              arch                = 3;
  string              user                = 4;
  string              hostname            = 5;
  map<string, string> network_interfaces  = 6;
  repeated string     available_languages = 7; // e.g. ["python2", "python3", "perl"]
  // Stable per-machine identifier, read once by the agent at startup.
  // Linux: /etc/machine-id. macOS: IOPlatformUUID. Windows:
  // HKLM\SOFTWARE\Microsoft\Cryptography\MachineGuid. Empty if the agent
  // couldn't read one — the server then falls back to a hash of
  // hostname + sorted MACs as a weaker host fingerprint.
  string              machine_id          = 8;
}

message DuplicateClientNotice {}

// UpdateRequest tells an agent to self-update. The agent fetches
// {base_url}/v1/manifest/{channel} and its detached Ed25519 signature,
// verifies the signature against the public key baked into the agent
// binary, picks the artifact entry that matches its own (GOOS, GOARCH),
// downloads {base_url}/v1/artifacts/{os}/{arch}/{version}, verifies
// SHA-256, and re-execs.
message UpdateRequest {
  string base_url = 1;
  string version  = 2;
  string channel  = 3;
}

// --- Process management ---

message ProcessStartRequest {
  string key            = 1;
  string path           = 2;
  int32  window_columns = 3;
  int32  window_rows    = 4;
}

message ProcessStartedResponse {
  string key = 1;
  int32  pid = 2;
}

message ProcessStoppedNotice {
  string key       = 1;
  int32  exit_code = 2;
}

message ProcessTerminateRequest {
  string key = 1;
}

message StdioData {
  string key  = 1;
  bytes  data = 2;
}

message WindowSizeUpdate {
  string key     = 1;
  int32  columns = 2;
  int32  rows    = 3;
}

// --- RPC: command execution ---

message ExecRequest {
  string command = 1;
}

message ExecResponse {
  bytes  output    = 1;
  int32  exit_code = 2;
  string error     = 3;
}

// --- RPC: file operations ---

message ReadFileRequest {
  string path   = 1;
  int64  offset = 2; // 0 = from start
  int64  size   = 3; // 0 = read all
}

message ReadFileResponse {
  bytes  data  = 1;
  string error = 2;
}

message WriteFileRequest {
  string path   = 1;
  bytes  data   = 2;
  bool   append = 3; // true = append, false = overwrite
}

message WriteFileResponse {
  int64  bytes_written = 1;
  string error         = 2;
}

message FileSizeRequest {
  string path = 1;
}

message FileSizeResponse {
  int64  size  = 1;
  string error = 2;
}

// --- Tunneling ---

enum TunnelMode {
  TUNNEL_MODE_PULL = 0;
  TUNNEL_MODE_PUSH = 1;
}

message TunnelCreateRequest {
  string     address = 1;
  TunnelMode mode    = 2;
}

message TunnelCreatedResponse {
  string tunnel_id = 1;
  string address   = 2;
}

message TunnelCreateFailed {
  string address = 1;
  string reason  = 2;
}

message TunnelConnectRequest {
  string tunnel_id = 1;
  string address   = 2;
}

message TunnelConnectedResponse {
  string tunnel_id = 1;
}

message TunnelConnectFailed {
  string tunnel_id = 1;
  string reason    = 2;
}

message TunnelData {
  string tunnel_id = 1;
  bytes  data      = 2;
}

message TunnelCloseRequest {
  string tunnel_id = 1;
}

message TunnelClosedNotice {
  string tunnel_id = 1;
}

message TunnelDisconnectedNotice {
  string tunnel_id = 1;
  string reason    = 2;
}

// --- SOCKS5 ---

message Socks5CreateRequest {}

message Socks5CreatedResponse {
  int32 port = 1;
}

message Socks5CreateFailed {
  string reason = 1;
}

message Socks5DestroyRequest {}

message Socks5DestroyedResponse {}

message Socks5DestroyFailed {
  string reason = 1;
}

// --- Mesh ---
//
// Platypus agents and server can form a self-organising overlay network.
// Each node has a locally-generated Ed25519 long-term identity keypair.
// NodeID is derived as base32(SHA256(pubkey))[:32] — self-certifying, so
// anyone who quotes a NodeID must be able to sign with the matching
// private key.
//
// A mesh is gated by a network-wide pre-shared key (PSK). Two nodes
// complete an application-level handshake (MeshHello / MeshHelloAck) over
// an already-established transport (TLS today) before they exchange any
// other payload on that link. The PSK proves both sides belong to the
// same network; an Ed25519 signature over both nonces proves the peer
// actually holds the private key for its claimed NodeID.
//
// Once a link is up, nodes exchange their known-peer tables
// (MeshPeerAnnounce, MeshPeerDelta) and their local link-state
// advertisements (MeshLSA). Every node runs Dijkstra on its collected
// LSDB and installs a next-hop routing table. Envelopes destined for a
// non-adjacent node are forwarded hop-by-hop based on Envelope.target_node
// + each node's routing table; intermediate nodes decrement TTL and
// never inspect the payload oneof.

// NodeInfo is a minimal record of a mesh node — enough to attempt a
// connection to it. pubkey is included so recipients can re-derive and
// verify the node_id locally.
message NodeInfo {
  string          node_id    = 1; // base32(sha256(pubkey))[:32]
  bytes           pubkey     = 2; // 32-byte Ed25519 public key
  repeated string addresses  = 3; // host:port entries the node listens on
  int64           last_seen  = 4; // unix seconds — observer's wall clock
}

// MeshHello is the first application-level frame sent on a new mesh link
// (the dialing side sends it, the listener replies with MeshHelloAck).
message MeshHello {
  string node_id      = 1;
  bytes  pubkey       = 2; // 32-byte Ed25519 public key
  bytes  nonce        = 3; // 32 random bytes
  bytes  psk_mac      = 4; // HMAC-SHA256(PSK, "platypus-mesh-hello"||pubkey||nonce)
  uint32 protocol     = 5; // mesh protocol version (current = 1)
  repeated string addresses = 6; // advertised listen addresses, informational
}

// MeshHelloAck is the reply. sig proves the responder holds the private
// key matching pubkey by signing the concatenated nonces and the peer's
// claimed node_id (prevents replay and identity swap).
message MeshHelloAck {
  string node_id      = 1;
  bytes  pubkey       = 2; // 32-byte Ed25519 public key
  bytes  nonce        = 3; // 32 random bytes (responder's side)
  bytes  psk_mac      = 4; // HMAC-SHA256(PSK, "platypus-mesh-hello-ack"||pubkey||nonce)
  bytes  sig          = 5; // Ed25519_sign(priv, peer_nonce||own_nonce||peer_node_id)
  uint32 protocol     = 6;
  repeated string addresses = 7;
}

// MeshKeepalive is a periodic heartbeat. Either side may send one. Links
// with no traffic for ~90 seconds are torn down.
message MeshKeepalive {
  int64 sent_at = 1; // unix nanos, for RTT measurement
}

// MeshPeerAnnounce is sent once per direction right after a handshake
// completes, carrying the sender's full known-peer table so the other
// side can quickly learn the wider mesh.
message MeshPeerAnnounce {
  repeated NodeInfo nodes = 1;
}

// MeshPeerDelta is an incremental update broadcast to every directly
// connected neighbour when the sender's known-peer set changes. seq
// is monotonically increasing per (origin_node_id) so receivers can
// deduplicate across multiple flooding paths.
message MeshPeerDelta {
  string            origin_node_id = 1;
  uint64            seq            = 2;
  repeated NodeInfo added          = 3;
  repeated string   removed_ids    = 4;
  uint32            ttl            = 5; // flood TTL, distinct from Envelope.ttl
}

// MeshLSA — link-state advertisement. Each node periodically (and on
// adjacency change) signs and floods a description of its directly
// connected neighbours. Only the node identified by origin_node_id can
// produce a valid signature; receivers discard duplicates by (origin, seq).
message MeshLSA {
  message Link {
    string node_id = 1; // neighbour's node_id
    uint32 cost    = 2; // abstract cost (1 by default; can be RTT-based later)
  }

  string         origin_node_id = 1;
  uint64         seq            = 2; // monotonic per origin
  int64          expires_at     = 3; // unix seconds
  repeated Link  links          = 4;
  bytes          pubkey         = 5; // for convenience; must match origin_node_id
  bytes          sig            = 6; // Ed25519_sign(priv, canonical_bytes(lsa without sig))
  uint32         flood_ttl      = 7; // flooding hop limit
}

// MeshUnreachable is sent back along the reverse path when a forwarding
// node has no route for an envelope's target_node.
message MeshUnreachable {
  string target_node = 1;
  string reason      = 2;
}

// --- Enrollment ---
//
// The first envelope an agent sends after TLS handshake is always an
// AgentEnrollRequest carrying either a PAT (plt_*) or a previously issued
// session token (sess_*). The server validates it, and on success returns
// an AgentEnrollResponse with an agent_id and a fresh session_token that
// the agent persists locally. Every subsequent reconnect uses the session
// token; the PAT is single-use by default.

message AgentEnrollRequest {
  // Either a PAT (prefix "plt_") or a session token (prefix "sess_").
  // The server routes on the prefix — an agent reconnecting with its
  // session token never needs a new PAT.
  string credential = 1;

  // Stable machine identifier (/etc/machine-id on Linux, IOPlatformUUID
  // on macOS, MachineGuid on Windows). May be empty if the agent
  // couldn't read one.
  string machine_id = 2;
  string hostname   = 3;

  // Ed25519 public key — reserved for future mesh/PKI integration so
  // that enrollment can also issue a mesh identity certificate.
  bytes pubkey = 4;

  string os      = 5;
  string arch    = 6;
  string version = 7;
}

message AgentEnrollResponse {
  // Non-empty means enrollment failed. The agent should surface this
  // and exit; the server side has already recorded the attempt in
  // pat_redemption_events / agent_connection_events.
  string error = 1;

  // Stable per-agent identifier, assigned on the first successful PAT
  // redemption. Unchanged across subsequent session rotations.
  string agent_id = 2;

  // Long-lived credential for future reconnects. The agent must
  // persist this to a 0600 file before acknowledging. Format: sess_<id>.<secret>.
  string session_token      = 3;
  int64  session_expires_at = 4;

  // Optional mesh bootstrap: if the server has mesh enabled, it hands
  // the agent a PSK and (eventually) a list of known mesh peers so the
  // agent can join the overlay without any extra configuration.
  bytes           mesh_psk   = 5;
  repeated string mesh_peers = 6;

  // Unix seconds at which the agent is encouraged to rotate — typically
  // session_expires_at minus a few hours so rotation doesn't race
  // against expiry during a temporary network partition.
  int64 recommended_renew_at = 7;
}

// SessionRenewRequest is sent by the agent over its already-authenticated
// connection a few hours before the session_token hits expires_at. It
// swaps the current session for a fresh one WITHOUT reconnecting, so
// any running shell / tunnel / SOCKS5 state stays live.
//
// Semantically identical to a reconnect-with-session_token, but
// cheaper: no TLS handshake, no hub-and-spoke session_id change in the
// agent-side Connect loop. The server rotates via
// enrollment.Service.RedeemSession and sends the new plaintext in
// SessionRenewResponse. The agent persists it atomically over the old
// session.token file before carrying on.
message SessionRenewRequest {
  // The agent echoes its currently-active session token so the server
  // can verify it matches the live row — a third party who somehow
  // got onto the open connection (not possible today, but defence in
  // depth) can't rotate without proof of ownership.
  string current_session_token = 1;
}

message SessionRenewResponse {
  // Non-empty means renewal failed (usually session_inactive, revoked,
  // or invalid_secret). The agent should disconnect and re-enroll; an
  // in-band failure means the session was killed out-of-band.
  string error = 1;

  string session_token        = 2;
  int64  session_expires_at   = 3;
  int64  recommended_renew_at = 4;
}

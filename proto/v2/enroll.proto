syntax = "proto3";
package platypus.v2;
option go_package = "github.com/WangYihang/Platypus/pkg/proto/v2;v2pb";

// Enroll messages are exchanged over a normal HTTPS POST to
// /api/v1/agents/enroll, not over the yamux link. An agent that
// does not yet hold a valid client certificate authenticates with
// a PAT; once it holds a cert, renewals reuse the same endpoint
// but authenticate via mTLS.
//
// Request/response bodies are protobuf-encoded to stay consistent
// with the link protocol; content-type is
// application/x-protobuf-platypus-v2.

message EnrollRequest {
  // One of `pat` or mTLS (out-of-band, from the TLS layer) proves
  // who the caller is. When both are empty, server rejects.
  string pat = 1;

  // PEM-encoded PKCS#10 certificate signing request. The subject
  // is ignored; server rewrites it with the final agent_id and
  // project id.
  bytes csr_pem = 2;

  // Optional agent-reported identifying info (stamped into the
  // cert SAN / audit log). The server trusts PAT-bound project
  // over agent-reported fields.
  string hostname    = 3;
  string machine_id  = 4;

  // Agent build identity. Populated from pkg/version at build time
  // via -ldflags. The server records all three on the host row so
  // operators can answer "exactly which build is on which box" and
  // the upgrade flow can decide whether a binary push is needed.
  //
  // build_version is semver (e.g. "1.5.1"); commit is short SHA;
  // build_date is RFC3339. They are advisory — the server never
  // gates security decisions on them.
  string build_version = 5;
  string commit        = 6;
  string build_date    = 7;

  // Wire-protocol version the agent speaks. Single monotonic
  // integer; bump when adding a new required field, changing
  // framing, or any other breaking change. Adding optional fields
  // or new StreamTypes does NOT bump it (proto3 + StreamReject
  // already cover those gracefully).
  //
  // Server compares against MinSupportedProtocolVersion at enroll
  // time. First-class clients always set this; absence (== 0) means
  // a pre-versioning agent that the server may treat as v1.
  uint32 protocol_version = 8;

  // Optional agent-reported system info, captured once at enroll
  // time and persisted alongside the host row so the Web UI has
  // something to show even when the agent is offline. Server treats
  // these as advisory only; they are never used as security
  // boundaries.
  string os               = 20;
  string arch             = 21;
  string platform         = 22;
  string platform_family  = 23;
  string platform_version = 24;
  string kernel_version   = 25;
  uint32 num_cpu          = 26;
  uint64 mem_total        = 27;
  string cpu_model        = 28;
  string current_user     = 29;
  string timezone         = 30;
  string primary_ip       = 31;
  string primary_mac      = 32;
  uint64 boot_time_unix   = 33;

  // Hardware / chassis classification (optional; captured once at
  // enroll so the host list already shows a machine-type icon
  // before the first agent reconnect triggers the full SysInfo
  // refresh).
  string machine_type     = 40;
  string chassis_type     = 41;
  string product_vendor   = 42;
  string product_name     = 43;
  string bios_vendor      = 44;
  string bios_version     = 45;
}

message EnrollResponse {
  // PEM-encoded agent leaf certificate, signed by the project CA.
  bytes cert_pem = 1;

  // PEM-encoded chain of issuer certs ending at the project root.
  // Agents must store this and use it as ClientCAs when they
  // later want to verify peer certs (e.g. in mesh).
  bytes ca_pem = 2;

  // Stable agent id the server bound the cert to. Also appears in
  // the cert CN.
  string agent_id = 3;

  // Project id; also appears in the cert SAN.
  string project_id = 4;

  // Unix seconds at which the cert expires. Agents should schedule
  // a renewal before this.
  int64 cert_expires_unix = 5;
}

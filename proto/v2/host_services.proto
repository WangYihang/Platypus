syntax = "proto3";
package platypus.v2;
option go_package = "github.com/WangYihang/Platypus/pkg/proto/v2;v2pb";

import "google/protobuf/empty.proto";
import "rpc.proto"; // ExecRequest/Response, Mkdir/Chmod/Delete/Rename/ListDir/Stat, SysInfoResponse

// HostServices is the gRPC service the agent exposes for out-of-process
// plugins to call back. The plugin dials it on the Unix socket whose
// path is passed in env var PLATYPUS_HOST_SOCKET. Every method enforces
// the calling plugin's granted capabilities at the agent boundary; a
// denied call returns status PERMISSION_DENIED with the message
// "capability_denied: <cap-id>".
//
// Authentication: the host socket is dialed only by the spawned plugin
// process (Unix peer credentials prove uid; the agent rejects any
// connection from a uid other than the plugin's). No bearer tokens.
//
// Wire shapes are the gRPC counterpart of the wasm host_* JSON
// envelopes; one method per wasm host fn family. Agent-side
// implementations share the same pure-Go core as the wasm host fns
// — see internal/agent/plugin/host_*.go.
service HostServices {
  // Logging
  rpc Log(LogRequest) returns (google.protobuf.Empty);

  // Per-plugin key/value (cap: kv)
  rpc KVGet(KVGetRequest) returns (KVGetResponse);
  rpc KVPut(KVPutRequest) returns (google.protobuf.Empty);

  // Filesystem read (cap: fs.read)
  rpc FSRead(FSReadHostRequest) returns (FSReadHostResponse);
  rpc FSReadRange(FSReadRangeHostRequest) returns (FSReadHostResponse);
  rpc FSListDir(ListDirRequest) returns (ListDirResponse);
  rpc FSStat(StatRequest) returns (StatResponse);

  // Filesystem write (cap: fs.write)
  rpc FSWrite(FSWriteHostRequest) returns (google.protobuf.Empty);
  rpc FSWriteRange(FSWriteRangeHostRequest) returns (google.protobuf.Empty);
  rpc FSMkdir(MkdirRequest) returns (MkdirResponse);
  rpc FSChmod(ChmodRequest) returns (ChmodResponse);
  rpc FSDelete(DeleteRequest) returns (DeleteResponse);
  rpc FSRename(RenameRequest) returns (RenameResponse);

  // Synchronous command execution (cap: exec). Reuses ExecRequest/
  // Response from rpc.proto so wasm and process runtimes report
  // identical shapes.
  rpc Exec(ExecRequest) returns (ExecResponse);

  // Outbound HTTP (cap: net.http)
  rpc HTTP(HostHTTPRequest) returns (HostHTTPResponse);

  // Host snapshot (cap: sysinfo)
  rpc Uname(google.protobuf.Empty) returns (HostUnameResponse);

  // Outbound TCP dial + bidirectional byte relay (cap: net.dial).
  // Client opens NetRelay after NetDial returns a handle; the first
  // outbound chunk the client sends MUST carry the handle id, and
  // subsequent chunks may have handle=0 (already established). The
  // server splices bytes between the dialed conn and the gRPC stream.
  rpc NetDial(NetDialHostRequest) returns (NetDialHostResponse);
  rpc NetRelay(stream NetRelayChunk) returns (stream NetRelayChunk);
  rpc NetClose(NetCloseHostRequest) returns (google.protobuf.Empty);

  // Streaming process spawn + relay (cap: process). Same handle-id
  // rule as NetRelay. Plugins send stdin / resize chunks; the agent
  // returns stdout / stderr / exit chunks.
  rpc ProcessSpawn(ProcessSpawnHostRequest) returns (ProcessSpawnHostResponse);
  rpc ProcessRelay(stream ProcessRelayChunk) returns (stream ProcessRelayChunk);
  rpc ProcessKill(ProcessKillHostRequest) returns (google.protobuf.Empty);
}

// ---- Logging ----

message LogRequest {
  // 0=debug, 1=info, 2=warn, 3=error. Mirrors host_log levels.
  uint32 level   = 1;
  string message = 2;
}

// ---- KV ----

message KVGetRequest  { string key = 1; }
message KVGetResponse {
  bool  found = 1;
  bytes value = 2;
}
message KVPutRequest {
  string key   = 1;
  bytes  value = 2;
}

// ---- FS read (cap: fs.read) ----

// FSReadHostRequest reads a whole file under the plugin's allowlist.
// Bounded by the agent's max_file_read_size (default 4 MiB).
message FSReadHostRequest { string path = 1; }
// FSReadRangeHostRequest reads a [offset, offset+length) slice;
// bounded by 256 KiB per call.
message FSReadRangeHostRequest {
  string path   = 1;
  int64  offset = 2;
  int64  length = 3;
}
message FSReadHostResponse {
  bytes data = 1;
  // size is the total file length; useful for range reads sizing
  // their next call. Always populated.
  int64 size = 2;
}

// ---- FS write (cap: fs.write) ----

message FSWriteHostRequest {
  string path = 1;
  bytes  data = 2;
}
message FSWriteRangeHostRequest {
  string path   = 1;
  int64  offset = 2;
  bytes  data   = 3;
}

// ---- HTTP (cap: net.http) ----

message HostHTTPRequest {
  string method  = 1;
  string url     = 2;
  map<string, string> headers = 3;
  bytes  body    = 4;
  uint32 timeout_ms = 5;
}
message HostHTTPResponse {
  uint32 status_code = 1;
  map<string, string> headers = 2;
  bytes  body = 3;
}

// ---- Uname (cap: sysinfo) ----

message HostUnameResponse {
  string os   = 1;
  string arch = 2;
}

// ---- TCP dial / relay (cap: net.dial) ----

message NetDialHostRequest {
  string target          = 1; // host:port; allowlist enforced
  uint32 dial_timeout_ms = 2;
}
message NetDialHostResponse {
  uint32 handle        = 1;
  string resolved_addr = 2;
}
// NetRelayChunk: first message must set handle to the value returned
// by NetDial. data carries the bytes; eof signals the writer's end.
message NetRelayChunk {
  uint32 handle = 1;
  bytes  data   = 2;
  bool   eof    = 3;
}
message NetCloseHostRequest { uint32 handle = 1; }

// ---- Process spawn / relay (cap: process) ----

message ProcessSpawnHostRequest {
  string command = 1;
  repeated string args = 2;
  string cwd = 3;
  map<string, string> env = 4;
  bool   pty = 5;
  uint32 cols = 6;
  uint32 rows = 7;
}
message ProcessSpawnHostResponse {
  uint32 handle = 1;
  int64  pid    = 2;
}
// ProcessRelayChunk multiplexes stdin / resize / stdout / stderr / exit
// over the bidi stream. From plugin (client) to agent (server) only
// {stdin, stdin_eof, resize} are meaningful; from agent to plugin only
// {stdout, stderr, exited, exit_code} are meaningful. The first
// message in either direction must carry handle.
message ProcessRelayChunk {
  uint32 handle    = 1;

  // Plugin -> agent
  bytes  stdin      = 2;
  bool   stdin_eof  = 3;
  ResizeRequest resize = 4;

  // Agent -> plugin
  bytes  stdout     = 5;
  bytes  stderr     = 6;
  bool   exited     = 7;
  int32  exit_code  = 8;
}
message ResizeRequest {
  uint32 cols = 1;
  uint32 rows = 2;
}
message ProcessKillHostRequest { uint32 handle = 1; }

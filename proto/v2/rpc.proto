syntax = "proto3";
package platypus.v2;
option go_package = "github.com/WangYihang/Platypus/pkg/proto/v2;v2pb";

// RpcRequest is the StreamHeader.metadata for STREAM_TYPE_RPC.
// The agent reads exactly one RpcRequest, sends exactly one
// RpcResponse, then closes the stream. Timeouts are delivered via
// context cancellation on both sides; the stream itself has no
// keepalive (short-lived by construction).
message RpcRequest {
  oneof payload {
    ExecRequest         exec         = 10;
    ListDirRequest      list_dir     = 20;
    StatRequest         stat         = 21;
    DeleteRequest       delete       = 22;
    RenameRequest       rename       = 23;
    MkdirRequest        mkdir        = 24;
    ChmodRequest        chmod        = 25;
    SysInfoRequest      sys_info     = 30;
    ProcessListRequest  process_list = 31;
    SecurityScanRequest security_scan = 32;
    ListSecurityChecksRequest list_security_checks = 33;
    ConfigAuditRequest config_audit = 34;
    ListConfigAuditorsRequest list_config_auditors = 35;
  }
}

message RpcResponse {
  // Populated on transport- or framework-level errors (e.g. unknown
  // request type, agent-side panic recovered). Service-level
  // failures go in the per-payload `error` fields.
  string error = 1;

  oneof payload {
    ExecResponse         exec         = 10;
    ListDirResponse      list_dir     = 20;
    StatResponse         stat         = 21;
    DeleteResponse       delete       = 22;
    RenameResponse       rename       = 23;
    MkdirResponse        mkdir        = 24;
    ChmodResponse        chmod        = 25;
    SysInfoResponse      sys_info     = 30;
    ProcessListResponse  process_list = 31;
    SecurityScanResponse security_scan = 32;
    ListSecurityChecksResponse list_security_checks = 33;
    ConfigAuditResponse config_audit = 34;
    ListConfigAuditorsResponse list_config_auditors = 35;
  }
}

// --- One-shot exec ---
message ExecRequest {
  string command = 1;
  repeated string args = 2;
  string cwd = 3;
  map<string, string> env = 4;
  // Max wait in milliseconds; 0 = no deadline beyond context.
  uint32 timeout_ms = 5;
}

message ExecResponse {
  bytes stdout = 1;
  bytes stderr = 2;
  int32 exit_code = 3;
  string error = 4;
}

// --- Filesystem metadata ---
message FileEntry {
  string name = 1;
  uint32 mode = 2;
  int64 size = 3;
  int64 mtime_unix_nano = 4;
  string symlink_target = 5;
}

message ListDirRequest  { string path = 1; }
message ListDirResponse {
  repeated FileEntry entries = 1;
  string error = 2;
}

message StatRequest  { string path = 1; }
message StatResponse {
  FileEntry entry = 1;
  string error = 2;
}

message DeleteRequest  { string path = 1; bool recursive = 2; }
message DeleteResponse { string error = 1; }

message RenameRequest  { string from = 1; string to = 2; }
message RenameResponse { string error = 1; }

message MkdirRequest  { string path = 1; uint32 mode = 2; bool mkdirs = 3; }
message MkdirResponse { string error = 1; }

message ChmodRequest  { string path = 1; uint32 mode = 2; }
message ChmodResponse { string error = 1; }

// --- System info (one-shot; periodic push uses EVENT stream) ---
message SysInfoRequest  {}

// NetworkInterface describes a single NIC as seen by the agent.
// Addresses are in CIDR form (e.g. "192.168.1.10/24"); Mac is the
// hardware address (empty on loopback / virtual); Flags mirror the
// Go net.Interface.Flags string ("up|broadcast|multicast").
message NetworkInterface {
  string name           = 1;
  string mac            = 2;
  repeated string addrs = 3;
  string flags          = 4;
  uint64 mtu            = 5;
  bool   is_up          = 6;
  bool   is_loopback    = 7;
}

// DiskPartition is a single filesystem mount point. TotalBytes /
// UsedBytes reflect the underlying storage; FsType is the kernel's
// filesystem name (ext4, xfs, apfs, NTFS, ...).
message DiskPartition {
  string device      = 1;
  string mountpoint  = 2;
  string fstype      = 3;
  uint64 total_bytes = 4;
  uint64 used_bytes  = 5;
}

// UserSession identifies a currently-logged-in user. Empty on
// platforms where the enumeration isn't available (some embedded
// systems, sandboxed containers).
message UserSession {
  string user        = 1;
  string terminal    = 2;
  string host        = 3;
  int64  started_at  = 4;
}

message SysInfoResponse {
  string os              = 1;
  string arch            = 2;
  string hostname        = 3;
  string kernel_version  = 4;
  double cpu_percent     = 5;
  uint64 mem_total       = 6;
  uint64 mem_used        = 7;
  uint64 disk_total      = 8;
  uint64 disk_used       = 9;
  // Deprecated: prefer `interfaces`. Kept for wire compat: keyed by
  // interface name, value is a comma-separated CIDR list.
  map<string, string> network_interfaces = 10;
  string error = 11;

  // --- Extended fields (all optional; agents on older builds leave
  // these zero/empty). The server and UI treat missing values as
  // "unknown" rather than failing. ---

  // Platform identification.
  string platform         = 20; // "ubuntu", "darwin", "windows", ...
  string platform_family  = 21; // "debian", "rhel", "bsd", ...
  string platform_version = 22; // "22.04", "14.1", "10.0.19045", ...
  string virtualization   = 23; // "kvm", "docker", "wsl", "" (bare metal)
  string timezone         = 24; // IANA tz name, e.g. "Asia/Shanghai"

  // Hardware.
  uint32 num_cpu          = 30; // logical CPU count
  uint32 num_cpu_physical = 31; // physical core count (0 if unknown)
  string cpu_model        = 32; // brand string of CPU 0
  double cpu_mhz          = 33;

  // Memory breakdown.
  uint64 mem_available    = 40;
  uint64 mem_free         = 41;
  uint64 swap_total       = 42;
  uint64 swap_used        = 43;

  // Uptime / boot.
  uint64 boot_time_unix   = 50;
  uint64 uptime_seconds   = 51;

  // Load (Linux/macOS). Zero on Windows.
  double load1            = 60;
  double load5            = 61;
  double load15           = 62;

  // Process / user session count.
  uint32 process_count    = 70;

  // Identity.
  string current_user     = 80; // e.g. "ubuntu", "root", "DESKTOP\\alice"
  // Agent build identity, mirrors EnrollRequest fields. Sent on
  // every SysInfo refresh so the host row stays in sync across
  // self-upgrades / manual binary swaps.
  string build_version    = 81; // semver, from pkg/version.Version
  string build_commit     = 83; // short git SHA, from pkg/version.Commit
  string build_date       = 84; // RFC3339, from pkg/version.Date
  uint32 protocol_version = 85; // mirrors EnrollRequest.protocol_version
  string machine_id       = 82;

  // Networking (rich).
  string default_gateway  = 90;
  string primary_ip       = 91; // source IP chosen for an outbound route
  string primary_mac      = 92;
  string public_ip        = 93; // legacy single-family probe; kept for older agents
  repeated NetworkInterface interfaces = 94;
  // Dual-stack public-IP probes. Each is the agent's apparent address
  // as observed by an external resolver over the corresponding
  // transport, so both can be populated when the host has working v4
  // and v6 egress (different addresses, different geo). Empty when the
  // family has no usable egress or the probe failed within the tight
  // timeout. New agents fill these instead of public_ip; the server
  // backfills public_ip as a copy of whichever is set so older clients
  // still get something.
  string public_ipv4      = 95;
  string public_ipv6      = 96;

  // Disks (rich).
  repeated DiskPartition disks = 100;

  // Logged-in users.
  repeated UserSession users   = 110;

  // When the snapshot was captured, agent-side wall clock.
  int64 sampled_at_unix = 120;

  // --- Hardware / chassis / machine classification (all optional) ---

  // Coarse classification of what the agent runs on. One of:
  // "container" | "vm" | "bare_metal" | "laptop" | "desktop" | "unknown".
  // Derived agent-side from container markers (cgroup, /.dockerenv),
  // gopsutil's VirtualizationSystem, and the SMBIOS chassis type.
  string machine_type      = 130;
  // Raw SMBIOS chassis type as a string (DMTF spec 3.3.4.1), e.g. "10"
  // (Notebook), "23" (Rack Mount). Empty when unavailable.
  string chassis_type      = 131;
  string product_vendor    = 132; // e.g. "Dell Inc.", "Apple Inc."
  string product_name      = 133; // e.g. "PowerEdge R740", "MacBookPro18,1"
  string bios_vendor       = 134;
  string bios_version      = 135;
  // Container runtime when machine_type=="container": "docker" |
  // "kubepods" | "containerd" | "lxc" | "podman" | "wsl" | "".
  string container_runtime = 136;

  // Graphics adapters. Static fields populated via /sys or WMI on all
  // platforms; runtime stats (utilization, VRAM used) come from
  // nvidia-smi when it's on PATH.
  repeated GPUInfo gpus    = 140;
}

// GPUInfo is a single graphics adapter. All fields are optional;
// zero/empty means "not reported" (which the UI renders as "—").
// Runtime stats (VramUsedBytes, UtilizationPct) require a vendor tool
// — today only nvidia-smi is consulted. Static fields (vendor/model/
// driver/VramTotal) come from the kernel (Linux /sys/class/drm) or
// WMI (Windows).
message GPUInfo {
  string vendor           = 1;   // "NVIDIA" | "AMD" | "Intel" | "Apple" | ...
  string model            = 2;   // brand / product name
  string driver           = 3;   // driver module name, e.g. "nvidia", "amdgpu"
  string driver_version   = 4;
  uint64 vram_total_bytes = 5;   // 0 = unknown
  uint64 vram_used_bytes  = 6;   // 0 = unknown
  double utilization_pct  = 7;   // 0 = unknown
  string bus_id           = 8;   // PCI bus id where applicable
  string uuid             = 9;   // vendor-provided uuid if any
  uint32 index            = 10;  // vendor-local ordinal (nvidia-smi index)
}

// ProcessInfo is a single OS process snapshot. Returned by the
// ProcessList RPC (populating the dedicated Processes tab in the UI).
// cmdline is truncated to 512 bytes agent-side to bound payload size.
message ProcessInfo {
  uint32 pid             = 1;
  uint32 ppid            = 2;
  string user            = 3;
  string name            = 4;
  string cmdline         = 5;
  string status          = 6;   // gopsutil Status() string, e.g. "S", "R"
  double cpu_percent     = 7;
  double mem_percent     = 8;
  uint64 rss_bytes       = 9;
  uint32 num_threads     = 10;
  int64  created_at_unix = 11;
}

// ProcessListRequest selects how many processes to return and how to
// sort them. The agent does the sort so top_n is meaningful. top_n=0
// means "all", capped at 500 server-side to keep the payload bounded.
message ProcessListRequest {
  uint32 top_n   = 1;
  string sort_by = 2;   // "cpu" (default) | "mem" | "rss" | "pid"
}

message ProcessListResponse {
  repeated ProcessInfo processes = 1;
  // Total process count before top_n slicing; useful for the UI to
  // show "30 of 412 processes".
  uint32 total_count             = 2;
  string error                   = 3;
}

// --- Host security scan (one-shot) ---
//
// SecurityScan is the agent-side equivalent of running a curated set
// of host-hardening checks: kernel-version freshness, sysctl posture,
// SSH server config, world-writable / SUID outliers, etc. The set of
// available checks is registered statically inside the agent (see
// internal/agent/security); the request lets the caller restrict the
// scan to a subset by id or category and place an overall deadline on
// the scan.
//
// The response is intentionally a flat list of findings — not a
// pass/fail per check — so a single check can surface multiple
// hardening hits (e.g. one SSH config check returning both
// "PermitRootLogin yes" and "PasswordAuthentication yes") without the
// caller needing to interleave structured sub-fields.
message SecurityScanRequest {
  // If non-empty, only run checks whose id is in this list. Unknown
  // ids are silently ignored.
  repeated string check_ids   = 1;
  // If non-empty, only run checks whose category is in this list.
  // Combined with check_ids as a union (any matching id OR category
  // runs).
  repeated string categories  = 2;
  // Per-check soft deadline in milliseconds; 0 = no per-check
  // deadline beyond the parent context. The scan as a whole is
  // bounded by the RPC stream's context.
  uint32 per_check_timeout_ms = 3;
}

// SecurityFinding is one hit produced by one check. Severity follows
// the conventional info / low / medium / high / critical ladder; the
// agent never emits "info" findings for a clean check (clean checks
// produce no finding at all — absence is the default-good signal).
message SecurityFinding {
  string id          = 1;  // stable id, e.g. "ssh.permit_root_login"
  string check_id    = 2;  // owning check, e.g. "ssh.config"
  string category    = 3;  // "kernel" | "sysctl" | "ssh" | "filesystem" | ...
  string severity    = 4;  // "low" | "medium" | "high" | "critical"
  string title       = 5;  // short human-readable headline
  string description = 6;  // longer explanation; safe to render as Markdown
  string evidence    = 7;  // the bit of state that triggered the finding
  string remediation = 8;  // suggested fix, one or two sentences
  // Optional CVE / advisory references. Free-form strings; the UI
  // links any token that matches /^CVE-\d{4}-\d+$/.
  repeated string references = 9;
}

// CheckResult tracks one check's lifecycle: did it run, did it fail
// to run (e.g. /proc/version unreadable on a locked-down host), how
// long did it take. Findings travel in the response-level list, not
// here, to keep the wire shape flat for the UI.
message CheckResult {
  string id          = 1;
  string category    = 2;
  // "ok"      = check ran cleanly
  // "skipped" = check not applicable on this host (e.g. linux-only on darwin)
  // "error"   = check ran and failed (permission denied, parse error, ...)
  string status      = 3;
  string error       = 4;  // populated when status="error"
  uint64 elapsed_ms  = 5;
  uint32 finding_count = 6;
}

message SecurityScanResponse {
  repeated SecurityFinding findings = 1;
  repeated CheckResult     checks   = 2;
  // Wall-clock UTC timestamp of when the scan started, agent-side.
  int64 started_at_unix             = 3;
  // Total scan duration in milliseconds (sum of per-check is <= this
  // when checks ran sequentially; current implementation does).
  uint64 elapsed_ms                 = 4;
  string error                      = 5;
}

// --- Enumerate registered security checks ---
//
// ListSecurityChecks returns every checker the agent has registered,
// regardless of whether it has ever run. The UI uses this to render
// a "checklist" before any scan completes — first-time visitors see
// the full set of checks the agent will run, with each row showing
// a "not run yet" placeholder until the user clicks Re-scan.
//
// `applicable` reflects what `Applicable(ctx)` returns on the agent
// at enumeration time — checkers gated by /etc/ssh/sshd_config
// missing, or by a non-Linux build, surface as inapplicable so the
// UI can render them dimmed and skip them in the per-check filter.

message ListSecurityChecksRequest {}

message AvailableSecurityCheck {
  string id          = 1;  // stable id, e.g. "ssh.config"
  string category    = 2;  // "kernel" | "sysctl" | "ssh" | "filesystem" | ...
  bool   applicable  = 3;
  // Operator-facing metadata. Populated from each Checker's
  // Metadata() so the UI's Coverage panel can render the scanner's
  // capability boundary without inspecting source.
  string title       = 4;
  string description = 5;
  repeated string references = 6;  // CVE ids, CIS sections, …
}

message ListSecurityChecksResponse {
  repeated AvailableSecurityCheck checks = 1;
  string error                            = 2;
}

// --- Host configuration audit (one-shot) ---
//
// ConfigAudit is the sibling of SecurityScan but focused on
// sensitive-information exposure rather than host hardening: it asks
// "is anything credential-shaped sitting in well-known places on this
// host?" Sources include process environment variables, per-user
// shell history files, well-known cloud / package-manager dotfiles
// (~/.aws/credentials, ~/.docker/config.json, ~/.kube/config, ...),
// database server configs (my.cnf, pg_hba.conf, redis.conf,
// mongod.conf), web app config files (.env, wp-config.php,
// settings.py, application.yml, appsettings.json), and ~/.ssh
// material. Detection uses the gitleaks default ruleset; secrets are
// redacted before the response leaves the agent.
message ConfigAuditRequest {
  // If non-empty, only run auditors whose id is in this list. Unknown
  // ids are silently ignored.
  repeated string auditor_ids       = 1;
  // If non-empty, only run auditors whose category is in this list.
  // Combined with auditor_ids as a union (any matching id OR
  // category runs).
  repeated string categories        = 2;
  // Per-auditor soft deadline in milliseconds; 0 = no per-auditor
  // deadline beyond the parent context.
  uint32 per_auditor_timeout_ms     = 3;
}

// ConfigLeak is one hit produced by one auditor. The match field is
// ALREADY REDACTED on the agent (first 4 + last 4 characters of the
// secret with a fixed-width "****" between them); plaintext
// credentials never travel over the wire.
message ConfigLeak {
  string id           = 1;  // stable id, e.g. "shell.history.gitleaks.aws-access-token"
  string auditor_id   = 2;  // owning auditor, e.g. "shell.history"
  string category     = 3;  // env | shell | cloud | database | webapp | ssh
  string risk         = 4;  // info | low | medium | high
  string title        = 5;  // short human-readable headline
  string location     = 6;  // "/root/.bash_history:142", "pid=1234 comm=nginx env=DB_PASS"
  string match        = 7;  // already-redacted snippet (e.g. "AKIA****WXYZ")
  string pattern      = 8;  // gitleaks RuleID, or "behavior:<id>" for our own rules
  string description  = 9;  // longer explanation; safe to render as Markdown
  string remediation  = 10; // suggested fix
  repeated string references = 11;
}

// AuditorResult tracks one auditor's lifecycle: did it run, did it
// fail to run, how long did it take. Modelled on CheckResult.
message AuditorResult {
  string id            = 1;
  string category      = 2;
  // "ok"      = auditor ran cleanly
  // "skipped" = not applicable on this host
  // "error"   = auditor ran and failed
  string status        = 3;
  string error         = 4;
  uint64 elapsed_ms    = 5;
  uint32 leak_count    = 6;
}

message ConfigAuditResponse {
  repeated ConfigLeak    leaks    = 1;
  repeated AuditorResult auditors = 2;
  int64  started_at_unix          = 3;
  uint64 elapsed_ms               = 4;
  string error                    = 5;
}

// --- Enumerate registered configuration auditors ---

message ListConfigAuditorsRequest {}

message AvailableAuditor {
  string id          = 1;
  string category    = 2;
  bool   applicable  = 3;
  string title       = 4;
  string description = 5;
  repeated string references = 6;
}

message ListConfigAuditorsResponse {
  repeated AvailableAuditor auditors = 1;
  string error                       = 2;
}

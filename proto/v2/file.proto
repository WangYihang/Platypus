syntax = "proto3";
package platypus.v2;
option go_package = "github.com/WangYihang/Platypus/pkg/proto/v2;v2pb";

// FileReadRequest opens a STREAM_TYPE_FILE_READ stream. After the
// FileReadResponse ack, the agent streams the file content as a
// sequence of FileChunk frames, the last one carrying eof=true.
// Chunk size is agent-chosen, capped by FrameMaxBytes.
//
// When reading fails after the header (permission lost, disk error)
// the final chunk carries eof=true AND a non-empty error; previous
// chunks may have delivered partial data.
message FileReadRequest {
  string path = 1;

  // Optional byte offset to start from. 0 = beginning.
  int64 offset = 2;

  // Maximum bytes to deliver. 0 = until EOF.
  int64 length = 3;
}

message FileReadResponse {
  // File size at the moment the stream opened. Useful for the
  // consumer to size a progress bar; not authoritative (file may
  // grow during the stream).
  int64 size = 1;

  // Unix mode bits of the source file, for round-tripping on the
  // copy-to-another-agent workflow.
  uint32 mode = 2;

  // Populated on open failure (missing file, permission denied).
  // When non-empty the stream closes immediately after this frame
  // with no FileChunk frames.
  string error = 3;
}

// FileChunk is one chunk of file bytes. Sender emits as many as
// it likes, setting eof=true on the final chunk. A chunk may have
// eof=true AND an error to report a mid-transfer failure.
message FileChunk {
  bytes data = 1;
  bool eof = 2;
  string error = 3;
}

// FileWriteRequest opens a STREAM_TYPE_FILE_WRITE stream. The
// server sends FileWriteHeader, agent responds with
// FileWriteResponse (ack), server streams raw bytes, then
// half-closes; agent responds with FileWriteResult (summary).
message FileWriteRequest {
  string path = 1;

  // If true, bytes are appended to an existing file; otherwise the
  // file is created or truncated.
  bool append = 2;

  // Unix mode for newly-created files. 0 = 0o644.
  uint32 mode = 3;

  // Create parent directories if missing.
  bool mkdirs = 4;
}

message FileWriteResponse {
  // Populated when the agent could not even open the destination
  // (missing parent dir with mkdirs=false, permission denied).
  // Stream closes immediately after this frame with no chunks
  // exchanged.
  string error = 1;
}

// FileWriteResult is the final summary message sent by the agent
// once the write stream has been fully consumed. Arrives as the
// last protobuf message on the stream before it closes.
message FileWriteResult {
  int64 bytes_written = 1;
  string error = 2;
}

// FileScanRequest opens a STREAM_TYPE_FILE_SCAN stream. The agent
// walks the named paths, accumulates totals, and replies with a
// single FileScanResponse. No file bytes flow. Used by the server
// to size a progress bar before kicking off an archive download.
message FileScanRequest {
  // Roots to walk. Each element is treated as a path on the
  // agent's filesystem; directories are descended recursively,
  // regular files contribute their size, others are counted but
  // contribute zero bytes.
  repeated string paths = 1;

  // If true, the walker follows symlinks; default false to avoid
  // accidental cycles. Note: even with this disabled, the listed
  // root paths themselves are stat'd via Lstat, so a symlink root
  // is reported as a 0-byte symlink.
  bool follow_symlinks = 2;
}

message FileScanResponse {
  // Number of regular files counted.
  int64 file_count = 1;

  // Number of directories counted.
  int64 dir_count = 2;

  // Sum of regular file sizes in bytes.
  int64 total_bytes = 3;

  // Populated when the walker could not even open one of the
  // root paths (missing, permission denied). Mid-walk errors are
  // silently skipped to keep the count useful even with a few
  // unreadable subtrees.
  string error = 4;
}

// ArchiveFormat picks the on-the-wire encoding for a
// STREAM_TYPE_FILE_ARCHIVE stream. tar.gz is the preferred default
// for cross-platform Unix payloads; zip is offered for Windows
// callers; uncompressed tar is mostly useful for already-compressed
// payloads (videos, archives) where gzip would burn CPU for no win.
enum ArchiveFormat {
  ARCHIVE_FORMAT_UNSPECIFIED = 0;
  ARCHIVE_FORMAT_TAR = 1;
  ARCHIVE_FORMAT_TAR_GZ = 2;
  ARCHIVE_FORMAT_ZIP = 3;
}

// FileArchiveRequest opens a STREAM_TYPE_FILE_ARCHIVE stream. The
// agent walks the named paths and streams the resulting archive
// back as FileChunk frames, the last one carrying eof=true. The
// server tallies bytes on the wire to drive progress reporting —
// no in-band progress frames are needed.
message FileArchiveRequest {
  repeated string paths = 1;
  ArchiveFormat format = 2;

  // If true, the walker follows symlinks. Same caveats as
  // FileScanRequest.follow_symlinks.
  bool follow_symlinks = 3;

  // Compression level for tar.gz / zip (0 = library default).
  // Range mirrors compress/gzip and archive/zip semantics: 1=fast,
  // 9=best. Out-of-range values clamp.
  int32 compression_level = 4;
}

// FileArchiveResponse is the first frame on the archive stream.
// Mirrors FileReadResponse: an empty error means the agent
// successfully opened the listed roots and is about to start
// emitting FileChunk frames; a populated error means the request
// failed before any data flowed and the stream is closing.
message FileArchiveResponse {
  string error = 1;
}

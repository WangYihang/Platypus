syntax = "proto3";
package platypus.v2;
option go_package = "github.com/WangYihang/Platypus/pkg/proto/v2;v2pb";

// TunnelPullRequest opens a local-to-remote tunnel (server->agent).
// The agent dials `target` from its own network; after ack the
// stream carries raw TCP bytes bidirectionally.
message TunnelPullRequest {
  // "host:port" dialable from the agent's network.
  string target = 1;

  // Dial timeout in milliseconds. 0 = 10s default.
  uint32 dial_timeout_ms = 2;
}

message TunnelPullResponse {
  // Local address the agent actually dialed (after resolution);
  // useful for audit logs. Empty on non-TCP or unsupported.
  string resolved_addr = 1;
}

// TunnelPushRequest opens a remote-to-local tunnel (agent->server).
// The agent has already accepted an inbound TCP conn on the
// operator-configured listen address; the server must dial the
// pre-configured local_target and splice both ends.
message TunnelPushRequest {
  // Opaque listen-config identifier (previously "address" in v1).
  // The server looks this up in its push-tunnel config map.
  string listen_config_id = 1;

  // Remote peer address observed by the agent. Advisory only.
  string peer_addr = 2;
}

message TunnelPushResponse {
  // Address the server dialed locally, for audit.
  string resolved_addr = 1;
}

// Socks5CtlRequest is the STREAM_TYPE_SOCKS5_CTL header metadata.
// This is a short-lived control RPC; the stream closes after the
// agent confirms start or stop.
message Socks5CtlRequest {
  enum Action {
    ACTION_UNSPECIFIED = 0;
    ACTION_START = 1;
    ACTION_STOP = 2;
  }
  Action action = 1;

  // Logical tunnel id (operator-assigned). On ACTION_START, agent
  // tracks by this id; on ACTION_STOP, agent tears down the
  // listener with this id.
  string tunnel_id = 2;

  // Bind address for ACTION_START. Usually 127.0.0.1:0 to let the
  // agent pick a port; the chosen port comes back in the response.
  string bind_addr = 3;
}

message Socks5CtlResponse {
  string bound_addr = 1;
}

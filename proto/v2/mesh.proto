syntax = "proto3";
package platypus.v2;
option go_package = "github.com/WangYihang/Platypus/pkg/proto/v2;v2pb";

// Mesh protocol messages. Platypus agents + server form a self-
// organising overlay. Identity = the platypus://agent/<id> or
// platypus://server/<id> URI SAN of the project-CA-signed leaf cert
// each node holds; gossip and LSA distribution sign with the same
// Ed25519 keypair the cert binds. mTLS at the transport layer
// (WebSocket on /api/v1/mesh/link) gates link admission against the
// project CA — there is no separate application-layer handshake or
// PSK.
//
// Wire format on each link: WebSocket binary frames carrying
// [4B BE length][MeshEnvelope proto bytes]. The receiver unmarshals
// the envelope, dispatches on the oneof, and decrements TTL +
// forwards when target_node is set and doesn't match the local
// NodeID.

// MeshEnvelope is the top-level mesh frame. One envelope per send.
message MeshEnvelope {
  uint32 version    = 1; // mesh protocol version (current = 1)
  string request_id = 2; // UUID for request/response correlation
  int64  timestamp  = 3; // unix nanoseconds

  // Routing fields. target_node empty means "for the immediate
  // peer on this link"; otherwise the receiver forwards along its
  // routing table toward that node, decrementing ttl.
  string source_node = 4;
  string target_node = 5;
  uint32 ttl         = 6;

  oneof payload {
    MeshKeepalive    keepalive    = 12;

    // Peer-table gossip
    MeshPeerAnnounce peer_announce = 20;
    MeshPeerDelta    peer_delta    = 21;

    // Link-state routing
    MeshLSA         lsa         = 30;
    MeshUnreachable unreachable = 31;

    // Multiplexed byte streams for bootstrap
    MeshStreamOpen    stream_open     = 40;
    MeshStreamOpenAck stream_open_ack = 41;
    MeshStreamData    stream_data     = 42;
    MeshStreamClose   stream_close    = 43;

    // Opaque payload: reserved for non-mesh-control data that still
    // wants to ride the routing layer (end-to-end app messages,
    // routing-reachability tests). The node hands these off to the
    // application-level PayloadHandler rather than interpreting them.
    bytes opaque = 50;
  }

  // Reserved tags from the legacy Noise handshake oneof
  // (MeshHello / MeshHelloAck / MeshHelloFinish). Don't reuse.
  reserved 10, 11, 13;
}

// NodeInfo is the minimal peer-table record: enough to attempt a
// connection plus the pubkey so recipients can verify gossip
// signatures. node_id is the cert URI SAN; pubkey is the cert's
// SPKI; cert_pem is the project-CA-signed leaf so receivers can
// chain-verify against their TrustedCAs pool.
message NodeInfo {
  string node_id    = 1;
  bytes  pubkey     = 2; // 32-byte Ed25519 public key
  repeated string addresses = 3; // host:port entries the node listens on
  int64  last_seen  = 4; // unix seconds — observer's wall clock
  string role       = 5; // "agent", "server", ...
  bool   bootstrap_service = 6; // true if node accepts bootstrap streams
  bytes  cert_pem   = 7; // project-CA-signed leaf, used for chain verify
}

// MeshKeepalive is a periodic heartbeat. Either side may send one;
// links with no traffic for ~90s are torn down. It doubles as the
// traffic-counter piggyback so the topology aggregator can light
// up edge weights and derive throughput via successive-tick deltas.
message MeshKeepalive {
  int64  sent_at            = 1; // unix nanos, for RTT measurement
  uint64 lifetime_bytes_in  = 2;
  uint64 lifetime_bytes_out = 3;
  uint64 lifetime_msgs_in   = 4;
  uint64 lifetime_msgs_out  = 5;
}

// MeshPeerAnnounce: sent once per direction after a link comes up,
// carrying the sender's full known-peer table so the other side can
// quickly learn the wider mesh. Signed by the sender so receivers
// reject forgeries from compromised relays.
message MeshPeerAnnounce {
  repeated NodeInfo nodes = 1;
  string origin_node_id   = 2;
  bytes  pubkey           = 3; // must equal cert SPKI
  bytes  sig              = 4; // Ed25519_sign(priv, canonical(announce without sig))
  bytes  origin_cert_pem  = 5; // project-CA-signed leaf
}

// MeshPeerDelta: incremental update broadcast to every directly-
// connected neighbour when the sender's known-peer set changes.
// seq is monotonic per origin_node_id so receivers deduplicate
// across flooding paths.
message MeshPeerDelta {
  string origin_node_id = 1;
  uint64 seq            = 2;
  repeated NodeInfo added = 3;
  repeated string removed_ids = 4;
  uint32 ttl            = 5; // flood TTL, distinct from envelope.ttl
  bytes  pubkey         = 6;
  bytes  sig            = 7; // Ed25519_sign(priv, canonical(delta without sig + ttl))
  bytes  origin_cert_pem = 8;
}

// MeshLSA: link-state advertisement. Each node periodically (and on
// adjacency change) signs and floods a description of its directly
// connected neighbours. Receivers discard duplicates by
// (origin_node_id, seq).
message MeshLSA {
  message Link {
    string node_id = 1; // neighbour's node_id
    uint32 cost    = 2; // abstract cost (1 by default; RTT-based later)
  }

  string origin_node_id = 1;
  uint64 seq            = 2; // monotonic per origin
  int64  expires_at     = 3; // unix seconds
  repeated Link links   = 4;
  bytes  pubkey         = 5;
  bytes  sig            = 6; // Ed25519_sign(priv, canonical(lsa without sig))
  uint32 flood_ttl      = 7;
  bytes  origin_cert_pem = 8;
}

// MeshUnreachable: sent back along the reverse path when a
// forwarding node has no route for an envelope's target_node.
message MeshUnreachable {
  string target_node = 1;
  string reason      = 2;
}

enum MeshStreamKind {
  MESH_STREAM_KIND_UNSPECIFIED = 0;
  MESH_STREAM_KIND_BOOTSTRAP_SERVER = 1;
}

message MeshStreamOpen {
  string         initiator_node_id = 1;
  uint64         stream_id         = 2;
  string         target_node_id    = 3;
  MeshStreamKind kind              = 4;
}

message MeshStreamOpenAck {
  string initiator_node_id = 1;
  uint64 stream_id         = 2;
  bool   ok                = 3;
  string error             = 4;
}

message MeshStreamData {
  string initiator_node_id = 1;
  uint64 stream_id         = 2;
  bytes  chunk             = 3;
  bool   eof               = 4;
}

message MeshStreamClose {
  string initiator_node_id = 1;
  uint64 stream_id         = 2;
  string reason            = 3;
}

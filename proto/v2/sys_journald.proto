syntax = "proto3";
package platypus.v2;
option go_package = "github.com/WangYihang/Platypus/pkg/proto/v2;v2pb";

// sys_journald.proto — wire shape for the systemd-journal log query
// plugin (com.platypus.sys-journald-linux).
//
// query shells `journalctl -o json` with a curated set of filter
// flags and parses each line into a structured Entry. A future
// macOS sibling (sys-log-darwin via `log show`) and Windows sibling
// (sys-log-windows via Get-WinEvent) will share this Entry shape.

message JournalQueryRequest {
  // --unit filter, e.g. "ssh.service". Empty = all units.
  string unit     = 1;
  // --priority filter. Accepts symbolic ("err", "warn") or numeric
  // ("0".."7"). Empty = all.
  string priority = 2;
  // --since (RFC3339 or relative like "2 hours ago"). Empty = no
  // lower bound.
  string since    = 3;
  // --until same format. Empty = no upper bound.
  string until    = 4;
  // --grep regex. Empty = no message-text filter.
  string grep     = 5;
  // -n line cap. 0 uses plugin default (200).
  uint32 lines    = 6;
  // -r reverse (newest-first). Default false (oldest-first).
  bool   reverse  = 7;
  // -b boot id selector. "0" = current boot, "-1" = previous, "" =
  // no boot filter.
  string boot     = 8;

  // ---- cursor pagination -------------------------------------
  //
  // after_cursor and before_cursor are mutually exclusive. They
  // bound the response to entries strictly newer / older than the
  // referenced entry, so a UI doing "load more" never returns the
  // boundary entry twice.
  //
  // Cursor encoding is per-OS but always opaque to the caller:
  //   linux    journalctl __CURSOR (e.g. "s=abc;i=42;b=...;m=...")
  //   windows  "<RecordId>@<LogName>" (e.g. "12345@System")
  //   darwin   "<timestamp_us>@<short_hash>" (no stable cursor on
  //            macOS; we synthesise one from the entry's timestamp
  //            + an FNV hash of the eventMessage to dedup within
  //            the same microsecond)
  //
  // The cursor is round-tripped back to the plugin verbatim — the
  // server never parses it.

  // Return entries strictly NEWER than after_cursor (oldest-first
  // order, "load newer entries"). Empty = no lower bound from
  // cursor.
  string after_cursor  = 9;
  // Return entries strictly OLDER than before_cursor (newest-first
  // order, "load older history"). Empty = no upper bound from
  // cursor.
  string before_cursor = 10;
}

message JournalQueryResponse {
  repeated JournalEntry entries = 1;
  // True when the journalctl output filled the line cap; the caller
  // should narrow the filter or lift `lines` for completeness.
  bool   truncated              = 2;
  string error                  = 3;

  // Cursor of the OLDEST entry in `entries` — pass back as
  // before_cursor to load the next-older window. Empty when
  // entries is empty or the OS doesn't support a stable cursor.
  string prev_cursor            = 4;
  // Cursor of the NEWEST entry in `entries` — pass back as
  // after_cursor to load the next-newer window.
  string next_cursor            = 5;
}

// JournalEntry is one record from journalctl. timestamp_us is the
// monotonic-source __REALTIME_TIMESTAMP, microseconds since epoch.
// Optional fields are zero/empty when journalctl didn't report them.
message JournalEntry {
  uint64 timestamp_us = 1;
  string unit         = 2;
  // syslog priority 0..7 (emerg..debug).
  uint32 priority     = 3;
  string message      = 4;
  string hostname     = 5;
  uint32 pid          = 6;
  uint32 uid          = 7;
  // SYSLOG_IDENTIFIER — tag the writer set, often the program name.
  string identifier   = 8;
  // _COMM — kernel-reported short process name.
  string comm         = 9;
  // Per-entry cursor — pass as JournalQueryRequest.after_cursor to
  // resume listing strictly after this entry, or as before_cursor
  // to resume strictly before. Empty when the OS doesn't support a
  // stable cursor for this record (unusual; only happens when the
  // backend tooling failed to surface its native cursor for the
  // entry).
  string cursor       = 10;
}

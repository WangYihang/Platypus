syntax = "proto3";
package platypus.v2;
option go_package = "github.com/WangYihang/Platypus/pkg/proto/v2;v2pb";

import "google/protobuf/empty.proto";
import "plugin.proto";

// PluginRuntime is the gRPC service every out-of-process plugin must
// implement. The agent dials the plugin's Unix socket (path passed in
// the env var PLATYPUS_PLUGIN_SOCKET when the plugin was launched) and
// invokes one of the four methods below. All four are required; a
// stub for unused ones must still respond with NOT_IMPLEMENTED so the
// agent sees a structured failure instead of a transport error.
//
// Lifecycle:
//   1. Agent exec.Cmd-launches the plugin binary with env vars
//      (PLATYPUS_HOST_SOCKET, PLATYPUS_PLUGIN_SOCKET, PLATYPUS_PLUGIN_ID,
//      PLATYPUS_PLUGIN_VERSION, PLATYPUS_GRANTED_CAPS, PLATYPUS_STATE_DIR).
//   2. Plugin listens on PLATYPUS_PLUGIN_SOCKET, prints "READY\n" to
//      stdout, then runs its gRPC server.
//   3. Agent waits up to 5s for the READY line, then dials and calls
//      Health(). Healthy plugin -> usable.
//   4. Agent invokes Call() (unary RPC) or Stream() (bidirectional)
//      as the operator drives the plugin.
//   5. On disable / agent shutdown the agent calls Shutdown(), then
//      sends SIGTERM after 3s grace, then SIGKILL after 5s.
//
// Capability enforcement happens AGENT-SIDE on every HostServices
// call (see host_services.proto). The plugin can lie about what
// capabilities it has — the agent's grant list is the source of truth.
service PluginRuntime {
  // Health is a liveness probe. Plugins must respond within 1s.
  // The response carries the plugin id+version the binary self-
  // identifies as; the agent rejects mismatches as a defense against
  // a tampered binary running under another id's signature.
  rpc Health(google.protobuf.Empty) returns (PluginHealthResponse);

  // Call dispatches a unary RPC. method/payload semantics are
  // plugin-defined and identical to the wasm runtime's PluginCallRequest
  // contract. timeout_ms 0 falls back to the manifest's
  // resources.max_invocation_ms (capped agent-side).
  rpc Call(PluginCallRequest) returns (PluginCallResponse);

  // Stream is the bidirectional streaming entry. The first inbound
  // message MUST carry PluginStreamMessage.open with the stream_name
  // matching one of the manifest's streams[] entries; subsequent
  // inbound messages carry PluginStreamMessage.frame chunks.
  // Outbound messages always carry PluginStreamMessage.frame; the
  // plugin emits KIND_EOF in the source=OUTBOUND direction to signal
  // its end of writes, and the agent emits KIND_EOF in source=INBOUND
  // to signal end of reads. KIND_ERROR from either side is terminal.
  rpc Stream(stream PluginStreamMessage) returns (stream PluginStreamMessage);

  // Shutdown is the graceful-stop request. Plugins should drain
  // in-flight calls + cancel daemon goroutines + return. The agent
  // does NOT wait indefinitely — see lifecycle note above.
  rpc Shutdown(google.protobuf.Empty) returns (google.protobuf.Empty);
}

// PluginHealthResponse identifies the running plugin so the agent can
// detect a swapped binary. ready=false means "alive but not yet
// serving" — the agent retries Health() up to the launch timeout
// before declaring failure.
message PluginHealthResponse {
  string plugin_id = 1;
  string version   = 2;
  bool   ready     = 3;
}

// PluginStreamMessage wraps the bidirectional Stream traffic. Exactly
// one of {open, frame} is set per message. open is valid ONLY as the
// very first inbound message; sending it again returns INVALID_ARGUMENT.
message PluginStreamMessage {
  oneof body {
    PluginStreamOpen  open  = 1;
    PluginStreamFrame frame = 2;
  }
}

// PluginStreamOpen is the first-message header on Stream(). Identifies
// which named stream from the manifest the agent is opening, and
// carries the typed request payload (e.g. a marshalled FileReadRequest
// for a file-read stream).
message PluginStreamOpen {
  string stream_name = 1;
  bytes  payload     = 2;
  uint64 timeout_ms  = 3;
}

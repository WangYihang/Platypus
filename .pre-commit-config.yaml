# Generated / vendored Go paths excluded from the formatting + import hooks;
# mirrors the `exclusions.paths` block in .golangci.yml so local and CI agree.
exclude: ^(pkg/proto/|pkg/dependencies/)

repos:
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        language: system
        types: [go]
        entry: gofmt -l -w

      - id: goimports
        name: goimports (-local github.com/WangYihang/Platypus)
        language: system
        types: [go]
        entry: bash -c '
          set -e;
          BIN="$(go env GOPATH)/bin/goimports";
          if [ ! -x "$BIN" ]; then
            go install golang.org/x/tools/cmd/goimports@latest;
          fi;
          "$BIN" -l -w -local github.com/WangYihang/Platypus "$@"' --

      - id: go-vet
        name: go vet
        language: system
        types: [go]
        pass_filenames: false
        entry: go vet ./...

      - id: go-mod-tidy
        name: go mod tidy
        language: system
        files: ^(go\.mod|go\.sum|.+\.go)$
        pass_filenames: false
        entry: go mod tidy

      - id: golangci-lint
        name: golangci-lint (pinned v2.11.4)
        language: system
        types: [go]
        pass_filenames: false
        entry: bash -c '
          set -e;
          BIN="$(go env GOPATH)/bin/golangci-lint";
          if [ ! -x "$BIN" ] || ! "$BIN" version 2>/dev/null | grep -q "2.11.4"; then
            go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4;
          fi;
          "$BIN" run ./...'

services:
  platypus-server:
    build:
      context: .
      target: server
    ports:
      - "9443:9443"
    volumes:
      - ./data:/app/data
    environment:
      PLATYPUS_EXTERNAL_ADDR: "localhost:9443"
      PLATYPUS_DATA_DIR: "/app/data"
      PLATYPUS_DEV: "1"
    restart: always
    depends_on:
      agent-publisher:
        condition: service_completed_successfully

  agent-publisher:
    build:
      context: .
      target: publisher
    volumes:
      - ./:/workspace:ro
      - ./.publisher/keys:/keys
      - ./.publisher/gocache:/root/.cache/go-build
      - ./.publisher/gomod:/go/pkg/mod
      - ./data:/output
    restart: "no"

services:
  platypus-server:
    build:
      context: .
      target: server
    ports:
      - "9443:9443" # Unified TLS ingress (REST + agent link + mesh + installer)
    volumes:
      - platypus_data:/app/data
      - ./config.docker.yml:/app/config.yml
    environment:
      # PLATYPUS_DEV=1 opts into the dev-only on-disk KEK fallback at
      # /app/data/ca.kek so a fresh `docker compose up` Just Works. For
      # production, REMOVE this line and inject a real PLATYPUS_CA_KEK
      # (32 bytes hex; `openssl rand -hex 32`) via a secret. Keeping the
      # KEK on the same volume as the encrypted DB defeats the seal.
      PLATYPUS_DEV: "1"
      # The bundled config.docker.yml leaves S3/MinIO credentials blank
      # so the file is safe to copy into other deployments. We inject
      # the dev MinIO root creds via env vars here; production should
      # use a docker secret / k8s Secret that points at non-default
      # MinIO credentials, and update both blocks to match.
      PLATYPUS_DISTRIBUTOR_STORE_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-platypus_admin}"
      PLATYPUS_DISTRIBUTOR_STORE_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-platypus_password}"
    restart: always
    depends_on:
      init-data:
        condition: service_completed_successfully
      minio:
        condition: service_healthy

  init-data:
    image: alpine
    volumes:
      - platypus_data:/app/data
    command: ["sh", "-c", "mkdir -p /app/data && chmod 777 /app/data"]

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      # Dev defaults; override via shell env (or a .env file) to point
      # at non-default credentials before `docker compose up`.
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-platypus_admin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-platypus_password}"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  platypus_data:
  minio_data:

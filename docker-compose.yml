services:
  platypus-server:
    build:
      context: .
      target: server
    ports:
      - "9443:9443" # Unified TLS ingress (REST + agent link + mesh + installer)
    volumes:
      - platypus_data:/app/data
    environment:
      # All server config is env vars now — see `platypus-server --help`
      # for the full list. The minimum needed to boot is
      # PLATYPUS_EXTERNAL_ADDR; everything else has a default.

      # External address agents reach. localhost works on the host running
      # docker compose; for a remote deployment override to a real public
      # IP / hostname (e.g. PLATYPUS_EXTERNAL_ADDR=1.2.3.4:9443).
      PLATYPUS_EXTERNAL_ADDR: "localhost:9443"
      PLATYPUS_DATA_DIR: "/app/data"

      # PLATYPUS_DEV=1 opts into the dev-only on-disk KEK fallback at
      # /app/data/ca.kek so a fresh `docker compose up` Just Works. For
      # production, REMOVE this line and inject a real PLATYPUS_CA_KEK
      # (32 bytes base64; `openssl rand 32 | base64`) via a secret.
      # Keeping the KEK on the same volume as the encrypted DB defeats
      # the seal.
      PLATYPUS_DEV: "1"

      # S3 distributor (MinIO sidecar). Endpoint + bucket enable it;
      # credentials are injected via env so this file is safe to copy
      # without leaking secrets. Production: use a docker / k8s secret.
      PLATYPUS_S3_ENDPOINT: "minio:9000"
      PLATYPUS_S3_BUCKET: "platypus-artifacts"
      PLATYPUS_S3_PREFIX: "agent/"
      PLATYPUS_S3_SECURE: "false"
      PLATYPUS_S3_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-platypus_admin}"
      PLATYPUS_S3_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-platypus_password}"
    restart: always
    depends_on:
      init-data:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      agent-publisher:
        condition: service_completed_successfully

  init-data:
    image: alpine
    volumes:
      - platypus_data:/app/data
    command: ["sh", "-c", "mkdir -p /app/data && chmod 777 /app/data"]

  # Dev-only sidecar: cross-compiles platypus-agent for the release
  # matrix, signs the manifest with a per-volume Ed25519 key, and
  # uploads to the compose MinIO so the enrollment flow Just Works.
  # Without this, /v1/manifest/<channel> 404s and every install link
  # is broken on a fresh `docker compose up`. Production deployments
  # should remove this service and run scripts/release-publish.sh
  # from CI with a vault-stored signing key.
  agent-publisher:
    build:
      context: .
      target: publisher
    volumes:
      # Source tree is read-only — release-publish.sh writes binaries
      # to a $(mktemp) under /tmp, never under /workspace.
      - ./:/workspace:ro
      # Persist the dev signing keypair across compose down/up so
      # agents installed in earlier sessions keep validating manifests
      # on upgrade. First boot generates the pair; later boots reuse it.
      - publisher_keys:/keys
      # Module + build caches survive container removal so warm
      # publishes finish in a few seconds instead of recompiling 24
      # targets from scratch.
      - publisher_gocache:/root/.cache/go-build
      - publisher_gomod:/go/pkg/mod
    environment:
      S3_ENDPOINT: "minio:9000"
      S3_BUCKET: "platypus-artifacts"
      S3_PREFIX: "agent/"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER:-platypus_admin}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-platypus_password}"
      S3_SCHEME: "http"
      # Override PLATFORMS to skip targets you don't care about — e.g.
      # PLATFORMS="linux/amd64 linux/arm64" cuts publish time to ~15 s.
      # PLATFORMS: ""
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      # Dev defaults; override via shell env (or a .env file) to point
      # at non-default credentials before `docker compose up`.
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-platypus_admin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-platypus_password}"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  platypus_data:
  minio_data:
  publisher_keys:
  publisher_gocache:
  publisher_gomod:

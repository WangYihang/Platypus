services:
  platypus-server:
    build:
      context: .
      target: server
    ports:
      - "9443:9443"
    volumes:
      - platypus_data:/app/data
    environment:
      - PLATYPUS_EXTERNAL_ADDR={PLATYPUS_EXTERNAL_ADDR:-localhost:9443}
      - PLATYPUS_DATA_DIR=/app/data
      - PLATYPUS_DEV=1
    restart: always
    depends_on:
      agent-publisher:
        condition: service_completed_successfully

  agent-publisher:
    build:
      context: .
      target: publisher
    volumes:
      - ./:/workspace:ro
      - publisher_keys:/keys
      - publisher_gocache:/cache/go-build
      - publisher_gomod:/cache/go-mod
      - platypus_data:/output
    restart: "no"

volumes:
  platypus_data:
  publisher_keys:
  publisher_gocache:
  publisher_gomod:

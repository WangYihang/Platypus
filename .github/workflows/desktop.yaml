name: Desktop

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
    paths:
      - "desktop/**"
      - ".github/workflows/desktop.yaml"
      - "Makefile"
  pull_request:
    paths:
      - "desktop/**"
      - ".github/workflows/desktop.yaml"
      - "Makefile"

jobs:
  test:
    name: Go test (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: desktop/go.mod
          cache: true
          cache-dependency-path: desktop/go.sum

      - name: Run tests
        run: make desktop-test

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: desktop/go.mod
          cache: true
          cache-dependency-path: desktop/go.sum

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: desktop/frontend/pnpm-lock.yaml

      - name: Install Linux WebKit deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev pkg-config build-essential

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis

      - name: Cache Wails CLI
        uses: actions/cache@v5
        with:
          path: ~/go/bin/wails
          key: ${{ runner.os }}-wails-v2.12.0

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install pnpm deps
        working-directory: desktop/frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        run: |
          VERSION=${{ github.ref_name }}
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            # Windows build with NSIS installer
            cd desktop && ~/go/bin/wails build -clean -nsis -ldflags "-s -w -X 'main.Version=$VERSION'"
          else
            make desktop-build LDFLAGS="-s -w -X 'main.Version=$VERSION'"
          fi
        shell: bash

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          VERSION=${{ github.ref_name }}
          cd desktop/build/bin
          # Rename single binary
          mv desktop.exe platypus-desktop-$VERSION-windows-amd64.exe
          # Rename NSIS installer
          mv *installer.exe platypus-desktop-$VERSION-windows-amd64-installer.exe || echo "No installer found"
        shell: bash

      - name: Package artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION=${{ github.ref_name }}
          cd desktop/build/bin
          tar -czvf platypus-desktop-$VERSION-linux-amd64.tar.gz desktop
        shell: bash

      - name: Package artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          VERSION=${{ github.ref_name }}
          cd desktop/build/bin
          
          # Install create-dmg
          brew install create-dmg
          
          # Create DMG
          APP_NAME=$(ls -d *.app)
          create-dmg \
            --volname "Platypus Desktop" \
            --window-pos 200 120 \
            --window-size 600 300 \
            --icon-size 100 \
            --icon "$APP_NAME" 150 150 \
            --hide-extension "$APP_NAME" \
            --app-drop-link 450 150 \
            "platypus-desktop-$VERSION-macos-universal.dmg" \
            "$APP_NAME"
          
          # Also keep the zip as a fallback
          zip -r platypus-desktop-$VERSION-macos-universal.zip "$APP_NAME"
        shell: bash

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            desktop/build/bin/*.zip
            desktop/build/bin/*.tar.gz
            desktop/build/bin/*.exe
            desktop/build/bin/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.os }}
          path: desktop/build/bin/*
          if-no-files-found: error
          retention-days: 14

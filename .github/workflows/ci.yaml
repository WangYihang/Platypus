name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.24']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./cmd/...

      - name: Test
        run: |
          go test -race -count=1 -timeout=60s \
            ./internal/api/ \
            ./internal/protocol/ \
            ./internal/session/ \
            ./internal/listener/ \
            ./internal/app/ \
            ./internal/agent/ \
            ./internal/utils/crypto/ \
            ./internal/utils/hash/ \
            ./internal/utils/str/ \
            ./internal/utils/os/

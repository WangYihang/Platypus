name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./cmd/...

      - name: Test
        run: go test -race -count=1 -timeout=120s ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # golangci-lint-action pulls a pre-built binary that's typically one Go
      # version behind and refuses to lint modules whose `go` directive is
      # higher than the binary's build version. Build from source with the
      # same toolchain setup-go pulled from go.mod so the lint binary is
      # built with Go ≥ the module's target.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

      - name: golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run ./...

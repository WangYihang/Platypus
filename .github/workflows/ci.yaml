name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./cmd/...

      - name: Test
        run: go test -race -count=1 -timeout=120s ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        # v7 understands the v2 config schema (version: "2" in .golangci.yml);
        # earlier majors pinned golangci-lint 1.x and reject our config.
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.2

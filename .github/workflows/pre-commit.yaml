name: pre-commit

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: pre-commit/action@v3.0.1

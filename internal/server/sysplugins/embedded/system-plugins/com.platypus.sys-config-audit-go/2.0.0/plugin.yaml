api_version: 1
id: com.platypus.sys-config-audit-go
name: SysConfigAudit (system, Go)
version: 2.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  TinyGo port of com.platypus.sys-config-audit v3. Same six auditors
  (shell.history, cloud.aws, ssh.private_keys, env.process, db.config,
  webapp.config), same wire output (protojson ConfigAuditResponse /
  ListConfigAuditorsResponse). Different plugin id (-go suffix) so
  both Rust and Go versions ship side-by-side.

  Coverage:
    - shell.history       9 history files per user with rule-pack +
                          behavioural patterns
    - cloud.aws           13 cloud/tool credential dotfiles per home;
                          rule-pack + world-readable mode flag
    - ssh.private_keys    PEM unencrypted private keys, world-readable
                          mode, authorized_keys without restrictions
    - env.process         /proc/<pid>/environ scanner
    - db.config           my.cnf/.pgpass/pg_hba.conf/redis.conf/
                          mongod.conf
    - webapp.config       depth-bounded walk of /var/www, /srv, /opt,
                          and per-user homes for framework configs

runtime:
  type: wasm
  entry: sys_config_audit.wasm
  abi: extism/1
  lang: go

rpc:
  - name: list_config_auditors
    request:  { proto: ListConfigAuditorsRequest }
    response: { proto: ListConfigAuditorsResponse }
  - name: config_audit
    request:  { proto: ConfigAuditRequest }
    response: { proto: ConfigAuditResponse }

capabilities:
  fs.read:
    paths:
      - /home
      - /root
      - /etc
      - /proc
      - /var/www
      - /srv
      - /opt
      - /var/log
      - /usr/local/etc

resources:
  max_memory_mb: 64
  max_invocation_ms: 120000

signature:
  algo: minisign-ed25519
  key_id: 130C1C9D9EFD8A97
  sig_file: sys_config_audit.wasm.minisig

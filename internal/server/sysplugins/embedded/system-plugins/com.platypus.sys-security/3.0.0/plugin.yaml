api_version: 1
id: com.platypus.sys-security
name: Security checks (system)
version: 3.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  System plugin — replaces the agent's built-in SecurityScan +
  ListSecurityChecks RPCs. Reads /proc + /etc + /sys + the standard
  binary directories directly via host_fs_*; the agent-side check
  registry is no longer in the path.

  Coverage:
    - kernel.version      flag kernels older than 5.10 LTS
    - kernel.mitigations  flag CPU vulns reported as exploitable in
                          /sys/devices/system/cpu/vulnerabilities/
    - ssh.config          flag risky sshd_config settings
                          (PermitRootLogin, PasswordAuthentication,
                          PermitEmptyPasswords, X11Forwarding)
    - sysctl.posture      10 hardening sysctls (kptr_restrict,
                          dmesg_restrict, unprivileged_bpf_disabled,
                          rp_filter, accept/send_redirects,
                          tcp_syncookies, fs.protected_*,
                          fs.suid_dumpable)
    - fs.path_writable    world-writable + non-sticky directories on
                          PATH or the standard fallback set
    - fs.suid_outliers    setuid/setgid binaries outside the
                          allowlist of well-known distro helpers

runtime:
  type: wasm
  entry: sys_security.wasm
  abi: extism/1

rpc:
  - name: security_scan
    request:  { proto: SecurityScanRequest }
    response: { proto: SecurityScanResponse }
  - name: list_security_checks
    request:  { proto: ListSecurityChecksRequest }
    response: { proto: ListSecurityChecksResponse }

# fs.read covers:
#   /proc  — osrelease, sysctls, PID 1 environ for live PATH
#   /etc   — sshd_config
#   /sys   — CPU vulnerability mitigation reports
#   binary dirs — listdir for SUID outliers + stat for path-writable
capabilities:
  fs.read:
    paths:
      - /proc
      - /etc
      - /sys
      - /usr
      - /usr/local
      - /bin
      - /sbin
      - /snap/bin
      - /opt

resources:
  max_memory_mb: 32
  max_invocation_ms: 90000

signature:
  algo: minisign-ed25519
  key_id: 130C1C9D9EFD8A97
  sig_file: sys_security.wasm.minisig

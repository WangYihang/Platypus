api_version: 1
id: com.platypus.sys-security-go
name: SysSecurity (system, Go)
version: 2.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  TinyGo port of com.platypus.sys-security v3. Same six checks, same
  wire output (protojson SecurityScanResponse /
  ListSecurityChecksResponse). Different plugin id (-go suffix); both
  Rust and Go versions ship side-by-side and the operator picks one
  via baseline_plugin_ids.

  Coverage:
    - kernel.version      flag kernels older than 5.10 LTS
    - kernel.mitigations  flag CPU vulns reported as exploitable in
                          /sys/devices/system/cpu/vulnerabilities/
    - ssh.config          flag risky sshd_config settings
    - sysctl.posture      10 hardening sysctls
    - fs.path_writable    world-writable + non-sticky directories on
                          PATH or the standard fallback set
    - fs.suid_outliers    setuid/setgid binaries off the allowlist

runtime:
  type: wasm
  entry: sys_security.wasm
  abi: extism/1
  lang: go

rpc:
  - name: list_security_checks
    request:  { proto: ListSecurityChecksRequest }
    response: { proto: ListSecurityChecksResponse }
  - name: security_scan
    request:  { proto: SecurityScanRequest }
    response: { proto: SecurityScanResponse }

capabilities:
  fs.read:
    paths:
      - /proc
      - /etc
      - /sys
      - /usr
      - /usr/local
      - /bin
      - /sbin
      - /snap/bin
      - /opt

resources:
  max_memory_mb: 32
  max_invocation_ms: 90000

signature:
  algo: minisign-ed25519
  key_id: 130C1C9D9EFD8A97
  sig_file: sys_security.wasm.minisig

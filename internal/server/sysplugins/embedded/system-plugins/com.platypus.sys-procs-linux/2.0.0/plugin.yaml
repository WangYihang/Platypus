api_version: 1
id: com.platypus.sys-procs-linux
name: Process list (linux)
version: 2.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  Linux-only process list plugin. Reads /proc/<pid>/{stat,status,
  cmdline,statm} directly via host_fs_read; the agent-side gopsutil-
  backed CollectProcessList is no longer in the path. Coverage:
  pid, ppid, name, cmdline, status, rss_bytes, num_threads, user
  (via /etc/passwd uid lookup). cpu_percent + mem_percent +
  created_at_unix deferred (require /proc/stat sampling across two
  reads or boot_time + jiffies math).

  Renamed from `com.platypus.sys-procs` in Sprint 2 (M0) to align
  with the per-OS naming convention; see sys-procs-darwin /
  sys-procs-windows for the macOS / Windows variants.

runtime:
  type: wasm
  entry: sys_procs_linux.wasm
  abi: extism/1
  lang: rust
  os_targets: [linux]

rpc:
  - name: process_list
    request:  { proto: ProcessListRequest }
    response: { proto: ProcessListResponse }

# fs.read of /proc + /etc lets the plugin enumerate processes +
# resolve uids → usernames directly, no host fn delegation.
capabilities:
  fs.read:
    paths: ["/proc", "/etc"]

resources:
  max_memory_mb: 32
  max_invocation_ms: 10000

signature:
  algo: minisign-ed25519
  key_id: 0FACCB2BC28AC155
  sig_file: sys_procs_linux.wasm.minisig

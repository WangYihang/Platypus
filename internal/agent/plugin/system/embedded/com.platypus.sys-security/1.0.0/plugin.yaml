api_version: 1
id: com.platypus.sys-security
name: Security checks (system)
version: 1.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  System plugin — replaces the agent's built-in SecurityScan +
  ListSecurityChecks RPCs. Forwards to the agent's check registry
  via host_security_scan / host_list_security_checks.

runtime:
  type: wasm
  entry: sys_security.wasm
  abi: extism/1

rpc:
  - name: security_scan
    request:  { proto: SecurityScanRequest }
    response: { proto: SecurityScanResponse }
  - name: list_security_checks
    request:  { proto: ListSecurityChecksRequest }
    response: { proto: ListSecurityChecksResponse }

capabilities:
  sysinfo: true

resources:
  max_memory_mb: 16
  max_invocation_ms: 60000

signature:
  algo: minisign-ed25519
  key_id: 5C9C41AD529D87AC
  sig_file: sys_security.wasm.minisig

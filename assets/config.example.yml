# Platypus host management hub — server config.
#
# `listeners` is the list of TLS ingress ports where managed-host agents
# dial back in. Each agent is identified by a hash derived from the fields
# listed in hashFormat:
#   `%i` IP
#   `%u` Username
#   `%m` MAC address
#   `%o` Operating System
#   `%t` Connect TimeStamp
# Using %t makes every reconnect a fresh hash; drop it to collapse repeat
# connections from the same host into a single session.
listeners:
  - host: "0.0.0.0"
    port: 13337
    hashFormat: "%i %u %m %o %t"
    disable_history: true
    public_ip: ""
    shell_path: "/bin/bash"

# REST/WebSocket API the desktop + web UI call into.
# Bind to 127.0.0.1 unless you've fronted it with TLS + reverse proxy.
restful:
  host: "0.0.0.0"
  port: 7331
  enable: true

# HTTP facade in front of the release artifact store. Agents hit this
# endpoint to fetch the signed release manifest and then follow a
# presigned URL straight to the object store for the binary itself —
# the Distributor never streams artifact bytes.
#
# `url` is the externally-reachable base URL that gets sent to agents
# in UpdateRequest messages. `channel` picks which manifest file is
# served (stable / beta / canary).
#
# `store` points at the S3-compatible backend where the release
# pipeline uploaded the manifest + binaries. Works with MinIO, AWS S3,
# Ceph RGW, or anything else that speaks the S3 API.
distributor:
  host: "0.0.0.0"
  port: 13339
  url: "http://127.0.0.1:13339"
  channel: "stable"
  presigned_ttl: "5m"
  store:
    endpoint: "s3.example.com"
    region: "us-east-1"
    bucket: "platypus-artifacts"
    prefix: "agent/"
    access_key_id: ""
    secret_access_key: ""
    use_ssl: true

# Open the web UI in a browser on server startup.
openBrowser: false

# Mesh overlay (optional) — enables the server to participate in the
# agent-to-agent overlay. Requires a PSK to be shared with all agents.
mesh:
  psk_file: "mesh.psk"
  identity_dir: "~/.platypus/mesh/server"
  listen_addr: ":17777"
  advertise_addrs: []
  peers: []
  discovery_lan: true        # Enable LAN peer discovery via mDNS
  discovery_interval: 30     # Interval in seconds between LAN scans
  project_id: "default"      # Project ID to isolate discovery on LAN

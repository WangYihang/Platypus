api_version: 1
id: com.platypus.sys-tunnel-pull
name: Tunnel Pull (system)
version: 1.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  System plugin — owns STREAM_TYPE_TUNNEL_PULL. Replaces the legacy
  Go HandleTunnelPullStream by delegating to the host_net_* family:
  this plugin parses the request + applies dial policy, the host
  runs the actual bidirectional byte splice between the operator's
  wire and the dialed TCP conn.

  Policy authority is in the wasm: an operator-supplied replacement
  could narrow the allowed target set, audit-log dials, refuse
  certain ports, etc. The host's responsibility ends at "splice
  bytes faithfully + close on either-side EOF".

runtime:
  type: wasm
  entry: sys_tunnel_pull.wasm
  abi: extism/1

streams:
  - name: pull
    stream_type: STREAM_TYPE_TUNNEL_PULL
    host_handler: wasm:pull

capabilities:
  net.dial:
    targets: ["*"]

resources:
  max_memory_mb: 16
  # Tunnel sessions can run for hours (long-lived TCP forwarders,
  # SSH tunnels, etc.). 1-hour ceiling keeps a wedged session from
  # running forever; in practice the wire close terminates first.
  max_invocation_ms: 3600000

signature:
  algo: minisign-ed25519
  key_id: REPLACE_WITH_YOUR_KEY_ID
  sig_file: sys_tunnel_pull.wasm.minisig

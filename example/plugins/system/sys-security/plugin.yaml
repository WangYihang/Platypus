api_version: 1
id: com.platypus.sys-security
name: Security checks (system)
version: 2.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  System plugin — replaces the agent's built-in SecurityScan +
  ListSecurityChecks RPCs. v2 reads /proc + /etc directly via
  host_fs_read; the agent-side check registry is no longer in the
  path.

  Coverage in v2 (subset of the legacy check set):
    - kernel.version: parse /proc/sys/kernel/osrelease, flag <5.10
    - ssh.config:     parse /etc/ssh/sshd_config, flag risky settings

  Future v3 ports the gopsutil-heavy checks (sysctl posture,
  world-writable scan, SUID outliers, kernel mitigations).

runtime:
  type: wasm
  entry: sys_security.wasm
  abi: extism/1

rpc:
  - name: security_scan
    request:  { proto: SecurityScanRequest }
    response: { proto: SecurityScanResponse }
  - name: list_security_checks
    request:  { proto: ListSecurityChecksRequest }
    response: { proto: ListSecurityChecksResponse }

# fs.read of /proc + /etc lets the plugin do its own check
# implementations (kernel version + sshd_config parsing).
capabilities:
  fs.read:
    paths: ["/proc", "/etc"]

resources:
  max_memory_mb: 16
  max_invocation_ms: 60000

signature:
  algo: minisign-ed25519
  key_id: 5C9C41AD529D87AC
  sig_file: sys_security.wasm.minisig

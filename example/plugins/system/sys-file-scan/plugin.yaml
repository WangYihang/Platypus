api_version: 1
id: com.platypus.sys-file-scan
name: File Scan (system)
version: 1.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  System plugin — owns STREAM_TYPE_FILE_SCAN. Replaces the legacy
  Go HandleFileScanStream with a wasm walker built on host_fs_listdir
  + host_fs_stat. Emits the same single FileScanResponse frame the
  legacy handler did so server-side readers don't change.

runtime:
  type: wasm
  entry: sys_file_scan.wasm
  abi: extism/1

streams:
  - name: scan
    stream_type: STREAM_TYPE_FILE_SCAN
    host_handler: wasm:scan

capabilities:
  fs.read:
    paths: ["/"]

resources:
  max_memory_mb: 32
  max_invocation_ms: 600000

signature:
  algo: minisign-ed25519
  key_id: REPLACE_WITH_YOUR_KEY_ID
  sig_file: sys_file_scan.wasm.minisig

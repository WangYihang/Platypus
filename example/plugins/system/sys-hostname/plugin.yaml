api_version: 1
id: com.platypus.sys-hostname
name: Hostname (system)
version: 2.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  System plugin — returns the host's hostname. v2 reads /etc/hostname
  (with /proc/sys/kernel/hostname fallback) directly via host_fs_read;
  the v1 host_sysinfo helper is gone now that sys-info is fully
  self-contained.

runtime:
  type: wasm
  entry: sys_hostname.wasm
  abi: extism/1

rpc:
  - name: hostname
    request:  { proto: HostnameRequest }
    response: { proto: HostnameResponse }

capabilities:
  fs.read:
    paths: ["/etc", "/proc/sys/kernel"]

resources:
  max_memory_mb: 16
  max_invocation_ms: 2000

signature:
  algo: minisign-ed25519
  key_id: 5C9C41AD529D87AC
  sig_file: sys_hostname.wasm.minisig

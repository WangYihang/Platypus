api_version: 1
id: com.platypus.sys-exec
name: Exec (system)
version: 1.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  System plugin — replaces the agent's built-in Exec RPC. Forwards
  to host_exec with the unrestricted-exec capability marker ("*").

runtime:
  type: wasm
  entry: sys_exec.wasm
  abi: extism/1

rpc:
  - name: exec
    request:  { proto: ExecRequest }
    response: { proto: ExecResponse }

# "*" is the wildcard accepted only because system plugins ship inside
# the agent build (operator implicitly trusts them). Third-party
# plugins should declare an explicit narrow command list.
capabilities:
  exec:
    commands: ["*"]

resources:
  max_memory_mb: 16
  max_invocation_ms: 30000

signature:
  algo: minisign-ed25519
  key_id: 5C9C41AD529D87AC
  sig_file: sys_exec.wasm.minisig

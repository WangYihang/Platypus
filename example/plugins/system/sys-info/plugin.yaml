api_version: 1
id: com.platypus.sys-info
name: SysInfo (system)
version: 2.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  System plugin — replaces the agent's built-in SysInfo RPC. v2
  reads /proc + /etc + /sys directly via host_fs_read + host_uname;
  the agent-side gopsutil-backed CollectSysInfo is no longer in the
  path. Coverage: hostname, kernel, mem, swap, num_cpu, cpu_model,
  uptime, load, process_count, distro from os-release, machine_id,
  timezone. Advanced fields (cpu%, per-disk usage, GPU, network
  interfaces, virtualization detection) deferred to v3 — the wire
  schema makes them optional.

runtime:
  type: wasm
  entry: sys_info_plugin.wasm
  abi: extism/1

rpc:
  - name: sys_info
    request:  { proto: SysInfoRequest }
    response: { proto: SysInfoResponse }

# fs.read of /proc + /etc + /sys lets the plugin do its own /proc
# parsing instead of going through a host fn that wraps gopsutil.
# sysinfo for host_uname (host's os/arch — wasm32 plugin can't
# derive these itself).
capabilities:
  sysinfo: true
  fs.read:
    paths: ["/proc", "/etc", "/sys"]

resources:
  max_memory_mb: 16
  max_invocation_ms: 5000

signature:
  algo: minisign-ed25519
  key_id: 5C9C41AD529D87AC
  sig_file: sys_info_plugin.wasm.minisig

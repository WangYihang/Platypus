api_version: 1
id: com.platypus.sys-file-write
name: File Write (system)
version: 1.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  System plugin — owns STREAM_TYPE_FILE_WRITE. Replaces the legacy
  Go HandleFileWriteStream by reading FileChunk frames off the wire
  via host_link_read_frame, writing each chunk to disk via
  host_fs_write_range, and emitting the same FileWriteResponse +
  FileWriteResult frames the legacy handler produced.

runtime:
  type: wasm
  entry: sys_file_write.wasm
  abi: extism/1

streams:
  - name: write
    stream_type: STREAM_TYPE_FILE_WRITE
    host_handler: wasm:write

capabilities:
  fs.write:
    paths: ["/"]

resources:
  max_memory_mb: 16
  max_invocation_ms: 600000

signature:
  algo: minisign-ed25519
  key_id: REPLACE_WITH_YOUR_KEY_ID
  sig_file: sys_file_write.wasm.minisig

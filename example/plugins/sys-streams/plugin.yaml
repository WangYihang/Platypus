api_version: 1
id: com.platypus.sys-streams
name: Stream dispatch (system)
version: 1.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  System plugin — owns every wire stream type the agent serves.
  Claim-only in MVP: each entry's host_handler maps to a named
  StreamProvider registered by the agent (see
  cmd/platypus-agent/stream_adapters.go). True wasm-mediated stream
  IO is Phase 2 (docs/plugins/STREAMING_ABI.md).

runtime:
  type: wasm
  entry: sys_streams.wasm
  abi: extism/1

streams:
  - name: process_open
    stream_type: STREAM_TYPE_PROCESS_OPEN
    host_handler: agent.process
  - name: file_read
    stream_type: STREAM_TYPE_FILE_READ
    host_handler: agent.file_read
  - name: file_write
    stream_type: STREAM_TYPE_FILE_WRITE
    host_handler: agent.file_write
  - name: file_scan
    stream_type: STREAM_TYPE_FILE_SCAN
    host_handler: agent.file_scan
  - name: file_archive
    stream_type: STREAM_TYPE_FILE_ARCHIVE
    host_handler: agent.file_archive
  - name: tunnel_pull
    stream_type: STREAM_TYPE_TUNNEL_PULL
    host_handler: agent.tunnel_pull

resources:
  max_memory_mb: 8
  max_invocation_ms: 1000

signature:
  algo: minisign-ed25519
  key_id: 5C9C41AD529D87AC
  sig_file: sys_streams.wasm.minisig

api_version: 1
id: com.platypus.sys-process-open
name: Process Open (system)
version: 1.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  System plugin — owns STREAM_TYPE_PROCESS_OPEN. Replaces the legacy
  Go HandleProcessStream by delegating to the host_process_*
  family: this plugin parses the request + applies policy, the host
  runs the actual bidirectional pump between the operator's wire and
  the child PTY (or pipes).

  Policy authority is in the wasm: an operator-supplied replacement
  could narrow the allowed command set, audit-log spawns, or refuse
  cwd outside a whitelist. The host's responsibility ends at "pump
  bytes faithfully + reap the child on close".

runtime:
  type: wasm
  entry: sys_process_open.wasm
  abi: extism/1

streams:
  - name: open
    stream_type: STREAM_TYPE_PROCESS_OPEN
    host_handler: wasm:open

capabilities:
  process:
    commands: ["*"]

resources:
  max_memory_mb: 16
  # PROCESS_OPEN sessions can run for hours (interactive shells).
  # The wasm method's wall-clock is whatever the operator's session
  # lives for; a 1-hour ceiling keeps a wedged session from running
  # forever, but in practice the wire close terminates first.
  max_invocation_ms: 3600000

signature:
  algo: minisign-ed25519
  key_id: REPLACE_WITH_YOUR_KEY_ID
  sig_file: sys_process_open.wasm.minisig

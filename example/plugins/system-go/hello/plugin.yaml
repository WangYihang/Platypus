api_version: 1
id: com.platypus.hello-go
name: HelloGo
version: 1.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  G0 smoke-test plugin: proves the Platypus extism plugin contract
  is language-portable by implementing a single hello-world RPC in
  Go (TinyGo wasi target).  Functionally trivial — the value is in
  showing the install pipeline + host fn integration round-trips
  cleanly through a non-Rust source language.

runtime:
  type: wasm
  entry: hello.wasm
  abi: extism/1
  # Informational; the agent doesn't branch on it.  Useful for the
  # web UI / authoring docs to surface "this is a Go plugin".
  lang: go

rpc:
  - name: hello
    request:  { proto: bytes }
    response: { proto: bytes }

# Install-time configuration. The wizard renders this as a form:
# "Greeting prefix" (string), "Shout" (boolean toggle). Operators
# who don't override the defaults get "Hello, <name> from Go!" —
# the plugin's historic behaviour. Operators who customise get
# whatever they typed.
#
# This is the canonical example referenced from
# docs/plugins/CONFIG_AUTHORING.md — keep it small + self-explanatory
# so plugin authors can read it as a starting point.
config:
  schema_version: 1
  schema:
    type: object
    properties:
      greeting:
        type: string
        description: "Word prefixed before the name. Default: Hello"
        default: "Hello"
      shout:
        type: boolean
        description: "Uppercase the entire greeting. Useful for
          excited deployments."
        default: false
  defaults:
    greeting: "Hello"
    shout: false

# CapLog is implicit (every plugin gets it without a manifest entry).
# No other capabilities needed.

resources:
  max_memory_mb: 16
  max_invocation_ms: 5000

signature:
  algo: minisign-ed25519
  key_id: REPLACE_WITH_YOUR_KEY_ID
  sig_file: hello.wasm.minisig

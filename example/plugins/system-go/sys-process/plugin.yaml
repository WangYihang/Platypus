api_version: 1
id: com.platypus.sys-process-go
name: Process control (system, Go)
version: 1.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  TinyGo port of com.platypus.sys-process. Same two entry points
  (exec RPC + open stream pump), same wire output, same capability
  declarations (exec + process). Different plugin id (-go suffix);
  both Rust and Go versions ship side-by-side.

runtime:
  type: wasm
  entry: sys_process.wasm
  abi: extism/1
  lang: go

rpc:
  - name: exec
    request:  { proto: ExecRequest }
    response: { proto: ExecResponse }

streams:
  - name: open
    stream_type: STREAM_TYPE_PROCESS_OPEN
    host_handler: wasm:open

capabilities:
  exec:
    commands: ["*"]
  process:
    commands: ["*"]

resources:
  max_memory_mb: 16
  max_invocation_ms: 3600000

signature:
  algo: minisign-ed25519
  key_id: REPLACE_WITH_YOUR_KEY_ID
  sig_file: sys_process.wasm.minisig

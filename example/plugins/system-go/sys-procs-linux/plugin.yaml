api_version: 1
id: com.platypus.sys-procs-linux-go
name: Process list (linux, Go)
version: 1.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  TinyGo port of com.platypus.sys-procs-linux. Same wire output
  (protojson v2pb.ProcessListResponse), same /proc walker.
  Different plugin id (-go suffix) so both Rust and Go versions
  ship side-by-side.

  Renamed from `com.platypus.sys-procs-go` in Sprint 2 (M0) to
  align with the per-OS naming convention.

runtime:
  type: wasm
  entry: sys_procs.wasm
  abi: extism/1
  lang: go
  os_targets: [linux]

rpc:
  - name: process_list
    request:  { proto: ProcessListRequest }
    response: { proto: ProcessListResponse }

capabilities:
  fs.read:
    paths: ["/proc", "/etc"]

resources:
  max_memory_mb: 32
  max_invocation_ms: 5000

signature:
  algo: minisign-ed25519
  key_id: REPLACE_WITH_YOUR_KEY_ID
  sig_file: sys_procs.wasm.minisig

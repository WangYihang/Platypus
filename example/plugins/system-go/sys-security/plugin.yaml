api_version: 1
id: com.platypus.sys-security-go
name: SysSecurity (system, Go)
version: 1.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  TinyGo port of com.platypus.sys-security. Same v2 check set
  (kernel.version + ssh.config), same wire output (protojson
  SecurityScanResponse / ListSecurityChecksResponse). Different
  plugin id (-go suffix); both Rust and Go versions ship side-by-
  side under embedded/ and the operator picks one via
  baseline_plugin_ids.

runtime:
  type: wasm
  entry: sys_security.wasm
  abi: extism/1
  lang: go

rpc:
  - name: list_security_checks
    request:  { proto: ListSecurityChecksRequest }
    response: { proto: ListSecurityChecksResponse }
  - name: security_scan
    request:  { proto: SecurityScanRequest }
    response: { proto: SecurityScanResponse }

capabilities:
  fs.read:
    paths: ["/proc", "/etc"]

resources:
  max_memory_mb: 16
  max_invocation_ms: 5000

signature:
  algo: minisign-ed25519
  key_id: REPLACE_WITH_YOUR_KEY_ID
  sig_file: sys_security.wasm.minisig

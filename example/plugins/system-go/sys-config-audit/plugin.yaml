api_version: 1
id: com.platypus.sys-config-audit-go
name: SysConfigAudit (system, Go)
version: 1.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  TinyGo port of com.platypus.sys-config-audit. Same v2 auditor
  set (shell.history, cloud.aws, ssh.private_keys), same wire
  output (protojson ConfigAuditResponse / ListConfigAuditorsResponse).
  Different plugin id (-go suffix) so both Rust and Go versions
  ship side-by-side.

runtime:
  type: wasm
  entry: sys_config_audit.wasm
  abi: extism/1
  lang: go

rpc:
  - name: list_config_auditors
    request:  { proto: ListConfigAuditorsRequest }
    response: { proto: ListConfigAuditorsResponse }
  - name: config_audit
    request:  { proto: ConfigAuditRequest }
    response: { proto: ConfigAuditResponse }

capabilities:
  fs.read:
    paths: ["/home", "/root", "/etc"]

resources:
  max_memory_mb: 32
  max_invocation_ms: 10000

signature:
  algo: minisign-ed25519
  key_id: REPLACE_WITH_YOUR_KEY_ID
  sig_file: sys_config_audit.wasm.minisig

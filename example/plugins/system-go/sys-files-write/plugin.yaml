api_version: 1
id: com.platypus.sys-files-write-go
name: Filesystem write (system, Go)
version: 1.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  TinyGo port of com.platypus.sys-files-write. Same six entry
  points (mkdir/chmod/delete/rename RPCs + write stream), same
  wire formats. Different plugin id (-go suffix) so both Rust and
  Go versions ship side-by-side.

runtime:
  type: wasm
  entry: sys_files_write.wasm
  abi: extism/1
  lang: go

rpc:
  - name: mkdir
    request:  { proto: MkdirRequest }
    response: { proto: MkdirResponse }
  - name: chmod
    request:  { proto: ChmodRequest }
    response: { proto: ChmodResponse }
  - name: delete
    request:  { proto: DeleteRequest }
    response: { proto: DeleteResponse }
  - name: rename
    request:  { proto: RenameRequest }
    response: { proto: RenameResponse }

streams:
  - name: write
    stream_type: STREAM_TYPE_FILE_WRITE
    host_handler: wasm:write

capabilities:
  fs.write:
    paths: ["/"]

resources:
  max_memory_mb: 16
  max_invocation_ms: 600000

signature:
  algo: minisign-ed25519
  key_id: REPLACE_WITH_YOUR_KEY_ID
  sig_file: sys_files_write.wasm.minisig

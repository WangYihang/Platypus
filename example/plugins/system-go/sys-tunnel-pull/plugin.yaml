api_version: 1
id: com.platypus.sys-tunnel-pull-go
name: Tunnel Pull (system, Go)
version: 1.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  TinyGo port of com.platypus.sys-tunnel-pull. Same flow (parse
  TunnelPullRequest → host_net_dial → ack via host_stream_write →
  host_net_relay), same wire shape. Different plugin id so both
  Rust and Go versions can ship side-by-side.

runtime:
  type: wasm
  entry: sys_tunnel_pull.wasm
  abi: extism/1
  lang: go

streams:
  - name: pull
    stream_type: STREAM_TYPE_TUNNEL_PULL
    host_handler: wasm:pull

capabilities:
  net.dial:
    targets: ["*"]

resources:
  max_memory_mb: 16
  max_invocation_ms: 3600000

signature:
  algo: minisign-ed25519
  key_id: REPLACE_WITH_YOUR_KEY_ID
  sig_file: sys_tunnel_pull.wasm.minisig

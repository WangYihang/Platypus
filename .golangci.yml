version: "2"

run:
  timeout: 5m
  tests: true

# Strict style + security linters (revive, gocritic, gosec) produced ~260
# findings across the legacy agent/admin/core code when first enabled.
# Fixing them inline on this branch is out of scope, so this config aims
# for "catches real bugs, not style nits":
#
#   - govet / staticcheck / ineffassign / unconvert / unused → real bugs
#   - errcheck / misspell                                     → useful hygiene
#
# New code added under desktop/ ships with its own go.mod and gets
# type-checked via `make desktop-test` separately. When the legacy paths
# get cleaned up, re-enable revive + gocritic + gosec here.
linters:
  default: none
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unconvert
    - unused
    - errcheck
    - misspell
  exclusions:
    paths:
      - pkg/proto
      - pkg/dependencies
      # Legacy code — unchecked errors on best-effort teardowns (resp.Body.Close,
      # conn.Close in defer, PTY writes) are idiomatic but noisy under errcheck.
      - internal/agent
      - internal/admin
      - internal/core
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: cmd/
        linters:
          - errcheck
      # Legacy melody-based WebSocket + notify handlers fire-and-forget by design.
      - path: internal/api/(websocket|handler_events)\.go
        linters:
          - errcheck
      # Helpers that log-and-continue on transient failures.
      - path: internal/utils/network/network\.go
        linters:
          - errcheck
      - path: pkg/version/version\.go
        linters:
          - errcheck
      # Swag-only request/response mirror types live here; they're referenced
      # by //@Success/@Param doc comments that the `unused` linter can't see.
      - path: internal/api/(handler_session|handler_tunnel|auth|responses)\.go
        linters:
          - unused
        text: "type .*(Request|Response|Result|Error|Entry|Ack|Server|ServerList|ClientMap|Languages|Oneliner) is unused"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/WangYihang/Platypus

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

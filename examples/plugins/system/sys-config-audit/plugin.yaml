api_version: 1
id: com.platypus.sys-config-audit
name: Config audit (system)
version: 3.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  System plugin — replaces the agent's built-in ConfigAudit +
  ListConfigAuditors RPCs. Reads /home + /root + /etc + /proc + the
  standard web-app deploy roots directly via host_fs_*.

  Coverage:
    - shell.history       9 history files per user (bash/zsh/sh/python/
                          mysql/psql/redis/node-repl/lesshst); rule-pack
                          credential scan + 3 behavioural patterns
                          (mysql -p inline, curl -u basic auth,
                          export FOO_KEY=)
    - cloud.aws           13 cloud/tool dotfiles per home (AWS, GCP,
                          Azure, k8s, docker, npm, pypi, netrc,
                          gitconfig); rule-pack scan + world-readable
                          permission flag
    - ssh.private_keys    PEM unencrypted private-key detection,
                          world-readable mode flag, authorized_keys
                          entries with no restriction options
    - env.process         /proc/<pid>/environ scanner with per-proc
                          256 KiB cap and aggregate 4 MiB budget
    - db.config           gitleaks-style scan of my.cnf + .pgpass;
                          structural rules on pg_hba.conf trust,
                          redis.conf (missing requirepass /
                          protected-mode no), mongod.conf (no auth)
    - webapp.config       depth-bounded walk (4 levels, 200 files) of
                          /var/www, /srv, /opt, and per-user homes
                          for framework configs (.env, wp-config.php,
                          settings.py, application.{yml,properties},
                          appsettings*.json, secrets.yml, …)

  Rule pack: ~50 high-signal regex patterns (AWS, GCP, Azure, GitHub,
  GitLab, Slack, Stripe, Twilio, SendGrid, OpenAI, Anthropic, npm,
  PyPI, Docker Hub, Vault, JWT, generic Bearer, RSA/OpenSSH/EC/PGP
  private-key block markers, …). See src/rules.rs.

runtime:
  type: wasm
  entry: sys_config_audit.wasm
  abi: extism/1

rpc:
  - name: config_audit
    request:  { proto: ConfigAuditRequest }
    response: { proto: ConfigAuditResponse }
  - name: list_config_auditors
    request:  { proto: ListConfigAuditorsRequest }
    response: { proto: ListConfigAuditorsResponse }

# fs.read covers:
#   /home, /root  — per-user history, dotfiles, ssh keys
#   /etc          — db config (mysql/redis/mongo/pg_hba)
#   /proc         — env scanner (per-pid environ + comm)
#   /var/www, /srv, /opt
#                 — webapp.config walks
#   /var/log      — db config sources occasionally drop here
#   /usr/local/etc — non-distro database installs (homebrew, FreeBSD)
capabilities:
  fs.read:
    paths:
      - /home
      - /root
      - /etc
      - /proc
      - /var/www
      - /srv
      - /opt
      - /var/log
      - /usr/local/etc

resources:
  max_memory_mb: 64
  max_invocation_ms: 120000

signature:
  algo: minisign-ed25519
  key_id: 5C9C41AD529D87AC
  sig_file: sys_config_audit.wasm.minisig

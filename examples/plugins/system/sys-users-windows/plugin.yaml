api_version: 1
id: com.platypus.sys-users-windows
name: Local accounts (windows)
version: 1.0.0
author:
  name: Platypus
  email: dev@example.com
license: Apache-2.0
description: |
  Windows account inventory via Get-LocalUser + Get-LocalGroup.
  Returns local user accounts (not domain accounts) with name,
  SID, full name, enabled flag, and group memberships. The
  Administrators group's members surface as SudoEntry rows so
  the UI shows "who can become root" the same way as on
  linux/darwin.

  By default well-known built-in accounts (System / DefaultAccount /
  WDAGUtilityAccount) are filtered; pass include_system=true to
  see them.

runtime:
  type: wasm
  entry: sys_users_windows.wasm
  abi: extism/1
  lang: rust
  os_targets: [windows]

rpc:
  - name: list_users
    request:  { proto: UserListRequest }
    response: { proto: UserListResponse }

capabilities:
  exec:
    commands:
      - "C:\\Windows\\System32\\WindowsPowerShell\\v1.0\\powershell.exe"

resources:
  max_memory_mb: 32
  max_invocation_ms: 30000

signature:
  algo: minisign-ed25519
  key_id: 5C9C41AD529D87AC
  sig_file: sys_users_windows.wasm.minisig
